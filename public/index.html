<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sound in NYC</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #fafafa;
  --white: #ffffff;
  --ink: #111111;
  --ink-light: #767676;
  --border: rgba(0,0,0,0.10);
  --border-med: rgba(0,0,0,0.18);
  --primary: #111111;
  --primary-dark: #000000;
  --primary-soft: #efefef;
  --accent-teal: #444444;
  --accent-yellow: #555555;
  --accent-pink: #555555;
  --accent-purple: #555555;
  --accent-orange: #555555;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 14px;
}
html, body { height: 100%; overflow: hidden; background: var(--cream); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; }


#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px; background: #fff;
  border-bottom: 1px solid #e8e8e8; flex-shrink: 0; z-index: 1000;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-text {
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  font-size: 21px; font-weight: 500; color: #111;
  letter-spacing: 0; line-height: 1;
  position: relative; display: inline-block;
}
/* white circular cutouts at letter joints, like the reference logo */
.logo-dot {
  position: absolute; width: 3.2px; height: 3.2px;
  background: #fff; border-radius: 50%; pointer-events: none;
  transform: translate(-50%, -50%);
}
.logo-icon { display: block; height: 28px; width: auto; color: #111; }

.header-actions { display: flex; align-items: center; gap: 8px; }

.btn { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 100px; transition: opacity .15s, background .15s; }
.btn:active { opacity: 0.75; }

/* generation tools: same pill family as NYC/record, grey fill = generative */
.btn-tool {
  background: #ededed; color: #111; border: 1.5px solid transparent;
  padding: 7px 16px; display: flex; align-items: center; gap: 6px;
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  font-weight: 700; font-size: 13px;
  transition: background .15s, color .15s;
}
.btn-tool:hover { background: #111; color: #fff; }
.btn-tool .tool-glyph { font-size: 14px; line-height: 1; }

.city-picker { position: relative; }
.btn-city {
  background: #fff; color: #111; border: 1.5px solid #111;
  padding: 7px 16px; display: flex; align-items: center; gap: 6px;
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  font-weight: 700; font-size: 13px;
}
.btn-city:hover { background: #f5f5f5; }
.btn-city-arrow { font-size: 9px; opacity: 0.55; transition: transform .18s; }
.btn-city.open .btn-city-arrow { transform: rotate(180deg); }

.city-dropdown {
  display: none; position: absolute; top: calc(100% + 6px); right: 0;
  background: #fff; border: 1.5px solid #111; border-radius: 12px;
  overflow: hidden; min-width: 160px; z-index: 2000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
.city-dropdown.open { display: block; }
.city-opt {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  color: #111; transition: background .12s;
}
.city-opt:hover { background: #f5f5f5; }
.city-opt.active { font-weight: 700; }
.city-opt-check { font-size: 11px; color: #111; opacity: 0; }
.city-opt.active .city-opt-check { opacity: 1; }
.city-opt-tag {
  font-size: 10px; font-weight: 500; background: #111; color: #fff;
  border-radius: 4px; padding: 1px 5px; letter-spacing: 0.5px;
}
.city-divider { height: 1px; background: #e8e8e8; margin: 0 12px; }

.btn-rec {
  background: #111; color: #fff; border: none;
  padding: 8px 20px; letter-spacing: 0.2px;
}
.btn-rec:hover { background: #333; }

/* ── Map ── */
#map-wrap { flex: 1; position: relative; min-height: 0; }
#map { width: 100%; height: 100%; }

/*
 * Pencil sketch style:
 * Positron tiles are already grey ink on white — like a clean technical drawing.
 * sepia(0.3) shifts the grey lines to warm ink-brown. contrast + brightness
 * lift the paper to cream and crisp the lines. Result: architect's field sketch.
 */
.leaflet-tile-pane {
  filter: grayscale(1) contrast(1.32) brightness(1.05);
}

.leaflet-container { background: #f4f4f2 !important; font-family: 'Inter', sans-serif !important; }
.leaflet-control-zoom a { background: rgba(255,255,255,0.92) !important; color: var(--ink) !important; border: 1.5px solid var(--border-med) !important; font-family: 'Inter', sans-serif !important; font-size: 15px !important; }
.leaflet-control-attribution { background: rgba(255,255,255,0.75) !important; font-size: 9px !important; }

.zoom-pill {
  position: absolute; bottom: 28px; left: 16px; z-index: 900; pointer-events: none;
  background: rgba(255,255,255,0.88); border: 1px solid var(--border-med); border-radius: 100px;
  padding: 4px 12px; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 11px;
  color: var(--ink-light); box-shadow: var(--shadow);
}

/* Map ripple */
.map-ripple {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary); opacity: 0.8; pointer-events: none; z-index: 800;
  transform: translate(-50%, -50%);
  animation: rippleOut 1.2s ease-out forwards;
}
@keyframes rippleOut {
  0%   { width: 10px; height: 10px; opacity: 0.7; }
  100% { width: 80px; height: 80px; opacity: 0; }
}

/* ── Shared panel ── */
.panel {
  position: fixed; right: 0; top: 58px; bottom: 0; width: 380px;
  background: var(--white); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 1400;
  box-shadow: -4px 0 24px rgba(0,0,0,0.06);
  animation: slideIn .22s cubic-bezier(0.22,1,0.36,1);
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.panel-head {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0;
}
.panel-head h3 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 17px; font-weight: 700; color: var(--ink); }
.panel-head p { font-size: 12px; color: var(--ink-light); margin-top: 2px; }
.panel-close { background: none; border: none; cursor: pointer; color: var(--ink-light); font-size: 22px; line-height: 1; padding: 2px; border-radius: 6px; }
.panel-close:hover { background: var(--cream); color: var(--ink); }

/* ── Timeframe bar ── */
.tf-bar { display: flex; gap: 4px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
.tf-btn {
  background: var(--cream); border: 1px solid var(--border-med); color: var(--ink-light);
  padding: 4px 12px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
  cursor: pointer; border-radius: 100px; transition: all .15s;
}
.tf-btn:hover { border-color: var(--primary); color: var(--primary-dark); }
.tf-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

/* ── Node timeline ── */
.timeline-scroll { flex: 1; overflow-y: auto; padding: 0; }
.timeline-scroll::-webkit-scrollbar { width: 4px; }
.timeline-scroll::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 4px; }

.tl-empty { padding: 48px 24px; text-align: center; color: var(--ink-light); font-family: 'Inter', sans-serif; font-size: 13px; }

.tl-item {
  display: flex; gap: 14px; padding: 0 20px;
  cursor: pointer; transition: background .12s;
  animation: nodeIn .3s ease both;
}
.tl-item:hover { background: var(--cream); }
@keyframes nodeIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }

.tl-track { display: flex; flex-direction: column; align-items: center; padding-top: 16px; }
.tl-dot {
  width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--white); box-shadow: 0 0 0 1.5px currentColor;
  transition: transform .15s;
}
.tl-item:hover .tl-dot { transform: scale(1.25); }
.tl-line { flex: 1; width: 1.5px; background: var(--border-med); margin-top: 4px; min-height: 12px; }
.tl-item:last-child .tl-line { display: none; }

.tl-body { flex: 1; padding: 14px 0 14px; border-bottom: 1px solid var(--border); }
.tl-item:last-child .tl-body { border-bottom: none; }
.tl-time { font-size: 11px; color: var(--ink-light); margin-bottom: 5px; }
.tl-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.tl-tag { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 500; }

.tl-audio-wrap { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
.tl-audio-wrap.open { max-height: 60px; }
.tl-audio-wrap audio { width: 100%; height: 28px; margin-top: 6px; accent-color: #111; }

/* ── Record modal ── */
.overlay { position: fixed; inset: 0; background: rgba(252,252,248,0.85); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; animation: fadeIn .15s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--white); border-radius: 20px; padding: 32px 32px 28px;
  width: 420px; max-width: 95vw; position: relative;
  box-shadow: var(--shadow-lg); border: 1px solid var(--border);
  animation: popIn .2s cubic-bezier(0.22,1,0.36,1);
}
@keyframes popIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
.modal-close { position: absolute; top: 16px; right: 18px; background: var(--cream); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 18px; color: var(--ink-light); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: #f0e8e0; color: var(--ink); }
.modal h2 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 20px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.loc-note { font-size: 11px; color: var(--ink-light); margin-bottom: 20px; }

.rec-center { display: flex; flex-direction: column; align-items: center; gap: 18px; }
.rec-ring {
  width: 140px; height: 140px; border-radius: 50%;
  border: 2.5px solid #111; background: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; gap: 2px; user-select: none;
  transition: box-shadow .2s, transform .15s;
}
.rec-ring:hover { box-shadow: 0 0 0 10px rgba(0,0,0,0.06); transform: scale(1.02); }
.rec-ring.active { animation: recPulse 1.2s ease-in-out infinite; }
@keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,0,0,0.22); } 50% { box-shadow: 0 0 0 18px rgba(0,0,0,0); } }
.rec-icon { font-size: 40px; color: var(--primary); }
.rec-count { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 44px; font-weight: 700; color: var(--primary); line-height: 1; }
.rec-label { font-size: 10px; letter-spacing: 2px; color: var(--ink-light); font-weight: 500; }
.rec-hint { font-size: 12px; color: var(--ink-light); }

.wave-bars { display: flex; align-items: center; gap: 4px; height: 40px; }
.wave-bar { width: 4px; border-radius: 4px; background: var(--primary); animation: wA .7s ease-in-out infinite alternate; min-height: 4px; }
@keyframes wA { from { height: 5px; } to { height: 34px; } }

.rec-review { display: flex; flex-direction: column; gap: 14px; }
audio { width: 100%; height: 30px; accent-color: #111; }

.tag-row { display: flex; gap: 6px; }
.tag-row input {
  flex: 1; background: var(--cream); border: 1.5px solid var(--border-med);
  color: var(--ink); padding: 9px 13px; font-family: 'Inter', sans-serif; font-size: 13px;
  border-radius: 10px; outline: none;
}
.tag-row input:focus { border-color: var(--primary); }
.tag-row input::placeholder { color: var(--ink-light); }
.tag-row .btn-add { background: var(--primary); color: #fff; border: none; width: 38px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 10px; }

.tags-wrap { display: flex; flex-wrap: wrap; gap: 5px; min-height: 20px; }
.tag-chip { padding: 3px 10px; font-size: 11px; border-radius: 100px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
.tag-chip:hover { opacity: 0.65; }

.review-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.btn-primary { background: var(--primary); color: #fff; border: none; padding: 10px 24px; font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 100px; }
.btn-primary:hover { opacity: 0.9; }
.btn-ghost { background: var(--cream); color: var(--ink-light); border: 1px solid var(--border-med); padding: 10px 20px; font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 100px; }
.btn-ghost:hover { border-color: var(--ink-light); color: var(--ink); }

.spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 16px 0; font-size: 13px; color: var(--ink-light); }
.spinner { width: 30px; height: 30px; border: 2.5px solid var(--border-med); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
.spinner-sm { display: inline-block; width: 11px; height: 11px; border: 1.5px solid var(--border-med); border-top-color: var(--accent-teal); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Music panel ── */
.gen-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
.gen-body label { display: block; font-size: 11px; font-weight: 500; color: var(--ink-light); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
.gen-body p { font-size: 12px; color: var(--ink-light); line-height: 1.7; }
.gen-status { font-size: 12px; color: var(--ink-light); font-style: italic; min-height: 16px; }
.btn-generate { background: #111; color: #fff; border: none; width: 100%; padding: 13px; font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 12px; transition: opacity .15s, box-shadow .15s; box-shadow: none; }
.btn-generate:hover { background: #333; }
.btn-generate:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
.gen-result { border: 1px solid var(--border-med); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
.gen-result h4 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 18px; color: #111; }
.btn-dl { display: block; text-align: center; border: 1px solid var(--border-med); color: var(--ink-light); padding: 9px; text-decoration: none; font-size: 12px; border-radius: 8px; transition: all .15s; }
.btn-dl:hover { border-color: #111; color: #111; }

.panel-msg { padding: 48px 24px; text-align: center; color: var(--ink-light); font-family: 'Inter', sans-serif; font-size: 13px; }

/* ── Waveform skyline view ── */
.skyline-overlay {
  position: fixed; inset: 0; background: #fff; z-index: 2500;
  display: flex; flex-direction: column; animation: fadeIn .2s;
}
.sky-head {
  padding: 22px 30px 8px; display: flex; align-items: flex-start;
  justify-content: space-between; flex-shrink: 0;
}
.sky-head h3 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 20px; font-weight: 700; color: #111; }
.sky-head p { font-size: 12px; color: var(--ink-light); margin-top: 3px; }
.sky-close { background: none; border: none; cursor: pointer; color: var(--ink-light); font-size: 26px; line-height: 1; padding: 2px 6px; }
.sky-close:hover { color: #111; }
.sky-canvas-wrap { flex: 1; position: relative; min-height: 0; }
.sky-canvas { width: 100%; height: 100%; display: block; cursor: default; }
.sky-tip {
  position: absolute; pointer-events: none; background: #111; color: #fff;
  font-size: 11px; padding: 5px 10px; border-radius: 8px; white-space: nowrap;
  transform: translate(-50%, -130%); opacity: 0; transition: opacity .12s;
}
.sky-status { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--ink-light); }
</style>
</head>
<body>


<div id="app">
  <header id="header">
    <div class="logo">
      <span class="logo-text">city sound<!-- white joint cutouts -->
        <span class="logo-dot" style="left:1.6px;  top:13px;"></span><!-- c left stroke -->
        <span class="logo-dot" style="left:21.2px; top:5px;"></span><!-- t stem top -->
        <span class="logo-dot" style="left:33.6px; top:13.6px;"></span><!-- y stroke junction -->
        <span class="logo-dot" style="left:52.4px; top:12.6px;"></span><!-- s spine center -->
        <span class="logo-dot" style="left:58.3px; top:13px;"></span><!-- o left -->
        <span class="logo-dot" style="left:68px;   top:13px;"></span><!-- o right -->
        <span class="logo-dot" style="left:76px;   top:18.4px;"></span><!-- u bottom center -->
        <span class="logo-dot" style="left:81.2px; top:7.4px;"></span><!-- u right stem top -->
        <span class="logo-dot" style="left:84.4px; top:8px;"></span><!-- n shoulder -->
        <span class="logo-dot" style="left:107px;  top:13px;"></span><!-- d stem right -->
      </span>
      <!-- single-line skyline icon: one continuous stroke, dips below baseline -->
      <svg class="logo-icon" viewBox="0 0 58 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter" stroke-linecap="square" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M0 19 H8 V9 H12 V26 H16 V13 H20 V16 H23 V2 H29 V25 H33 V10 H37 V28 H41 V12 H45 V19 H58"/>
      </svg>
    </div>
    <div class="header-actions">
      <button class="btn btn-tool" id="btn-sky" title="the city as one waveform"><span class="tool-glyph">≈</span> skyline</button>
      <button class="btn btn-tool" id="btn-gen" title="generate a house track from the recordings"><span class="tool-glyph">♪</span> generate</button>
      <div class="city-picker" id="city-picker">
        <button class="btn btn-city" id="btn-city">
          <span id="city-label">NYC</span>
          <span class="btn-city-arrow">▾</span>
        </button>
        <div class="city-dropdown" id="city-dropdown">
          <div class="city-opt active" data-city="NYC">
            New York City <span class="city-opt-check">✓</span>
          </div>
          <div class="city-divider"></div>
          <div class="city-opt" data-city="LA" style="opacity:0.4;pointer-events:none;">
            Los Angeles <span class="city-opt-tag">soon</span>
          </div>
          <div class="city-opt" data-city="CHI" style="opacity:0.4;pointer-events:none;">
            Chicago <span class="city-opt-tag">soon</span>
          </div>
          <div class="city-opt" data-city="LDN" style="opacity:0.4;pointer-events:none;">
            London <span class="city-opt-tag">soon</span>
          </div>
          <div class="city-opt" data-city="TKY" style="opacity:0.4;pointer-events:none;">
            Tokyo <span class="city-opt-tag">soon</span>
          </div>
        </div>
      </div>
      <button class="btn btn-rec" id="btn-rec">● record</button>
    </div>
  </header>
  <div id="map-wrap">
    <div id="map"></div>
    <!-- paper grain sits above tiles, below grid/controls -->
    <svg id="map-grain" style="position:absolute;inset:0;pointer-events:none;z-index:450;width:100%;height:100%;" aria-hidden="true">
      <defs>
        <filter id="grain-filter" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
          <feColorMatrix type="saturate" values="0"/>
        </filter>
      </defs>
      <rect width="100%" height="100%" filter="url(#grain-filter)" opacity="0.055"/>
    </svg>
    <div class="zoom-pill" id="zoom-pill">zoom 12</div>
  </div>
</div>
<div id="portal"></div>

<script>
'use strict';

const API = '';

/* ── Tag color system ── */
// monochrome tag styling to match the black & white identity
const TAG_STYLE = { bg:'#f2f2f2', fg:'#333333' };

function tagColor() {
  return TAG_STYLE;
}
function dotColor() {
  return '#111111';
}

/* ── Helpers ── */
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
function mount(node) { document.getElementById('portal').appendChild(node); return () => node.remove(); }
function fmtTime(ts) { return new Date(ts).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
function sinceDate(tf) {
  const d = new Date();
  if (tf==='1h')  d.setHours(d.getHours()-1);
  else if (tf==='24h') d.setDate(d.getDate()-1);
  else if (tf==='7d')  d.setDate(d.getDate()-7);
  else if (tf==='30d') d.setDate(d.getDate()-30);
  return d.toISOString();
}
function cellSize(zoom) {
  const s={10:.05,11:.025,12:.0125,13:.00625,14:.003125,15:.001562,16:.000781,17:.000390};
  return s[Math.min(17,Math.max(10,Math.round(zoom)))]??.0125;
}

let gridLayer = null;
let activeHighlight = null;

/* ── Grid fetch + draw ── */
let drawGeneration = 0;
let drawDebounce = null;

function scheduleDrawGrid() { clearTimeout(drawDebounce); drawDebounce = setTimeout(drawGrid, 120); }

async function drawGrid() {
  const gen = ++drawGeneration;
  const b = map.getBounds(), z = map.getZoom();
  document.getElementById('zoom-pill').textContent = `zoom ${Math.round(z)}`;

  let cells = [];
  try {
    const p = new URLSearchParams({ south:b.getSouth(),north:b.getNorth(),west:b.getWest(),east:b.getEast(),zoom:z });
    cells = await fetch(`${API}/api/grid?${p}`).then(r=>r.json());
  } catch(_) {}
  if (gen !== drawGeneration) return;

  if (gridLayer) { gridLayer.remove(); gridLayer = null; }

  const cellMap = {}, cs = cellSize(z);
  let maxCount = 0;
  for (const c of cells) { cellMap[`${c.row}_${c.col}`] = c.count; if (c.count > maxCount) maxCount = c.count; }

  const sr = Math.floor(b.getSouth()/cs), er = Math.ceil(b.getNorth()/cs);
  const sc = Math.floor(b.getWest()/cs),  ec = Math.ceil(b.getEast()/cs);
  const layer = L.layerGroup();

  /* ── 1. Dotted grid lines (all cells) ── */
  const lineOpt = { color:'#b9b9b9', weight:0.8, dashArray:'2 7', opacity:0.75, interactive:false };
  for (let row = sr; row <= er + 1; row++) {
    L.polyline([[row*cs, sc*cs], [row*cs, (ec+1)*cs]], lineOpt).addTo(layer);
  }
  for (let col = sc; col <= ec + 1; col++) {
    L.polyline([[sr*cs, col*cs], [(er+1)*cs, col*cs]], lineOpt).addTo(layer);
  }

  /* ── 2. Pencil-wash fill for occupied cells ── */
  for (let row = sr; row <= er; row++) {
    for (let col = sc; col <= ec; col++) {
      const count = cellMap[`${row}_${col}`] ?? 0;
      if (!count) continue;

      const ratio = count / Math.max(maxCount, 1);
      const fillOpacity = 0.18 + ratio * 0.22;
      const strokeOpacity = 0.55 + ratio * 0.3;
      const style = {
        fillColor: '#555555', fillOpacity,
        color: '#222222', weight: 1.2,
        dashArray: '3 5', opacity: strokeOpacity,
        interactive: true,
      };
      const bounds = { south:row*cs, north:(row+1)*cs, west:col*cs, east:(col+1)*cs };
      const rect = L.rectangle(
        [[bounds.south, bounds.west],[bounds.north, bounds.east]], style
      );
      const hoverStyle = { ...style, fillOpacity: Math.min(fillOpacity + 0.15, 0.55), weight:2, dashArray:'3 4', opacity:1 };
      rect.on('mouseover', () => { rect.setStyle(hoverStyle); map.getContainer().style.cursor = 'pointer'; });
      rect.on('mouseout',  () => { rect.setStyle(style);      map.getContainer().style.cursor = ''; });
      rect.on('click', () => { showHighlight(bounds); openTimeline({ row, col, cs, count, bounds }); });
      layer.addLayer(rect);
    }
  }

  layer.addTo(map);
  gridLayer = layer;
}

function showHighlight(bounds) {
  if (activeHighlight) { activeHighlight.remove(); activeHighlight = null; }
  activeHighlight = L.rectangle(
    [[bounds.south, bounds.west],[bounds.north, bounds.east]],
    { color:'#111111', weight:2, fill:false, dashArray:'5 4', opacity:0.9 }
  ).addTo(map);
}

map.on('moveend', scheduleDrawGrid);
map.on('zoomend', scheduleDrawGrid);
drawGrid();

function openTimeline(cell) {
  if (timelineUnmount) { timelineUnmount(); timelineUnmount = null; }

  const panel = el('div', { class:'panel' });
  const head  = el('div', { class:'panel-head' },
    el('div', {},
      el('h3', {}, 'this block'),
      el('p',  {}, `${cell.count} sound${cell.count!==1?'s':''} captured here`)
    ),
    el('button', { class:'panel-close', onclick:()=>{
      timelineUnmount(); timelineUnmount=null;
      if (activeHighlight) { activeHighlight.remove(); activeHighlight=null; }
    }}, '×')
  );

  const tfBar  = el('div', { class:'tf-bar' });
  const scroll = el('div', { class:'timeline-scroll' });
  panel.append(head, tfBar, scroll);

  let openAudio = null;

  async function loadRecs(tf) {
    scroll.innerHTML = '<div class="panel-msg">listening…</div>';
    const p = new URLSearchParams({ south:cell.bounds.south,north:cell.bounds.north,west:cell.bounds.west,east:cell.bounds.east });
    if (tf !== 'all') p.append('since', sinceDate(tf));
    try {
      const recs = await fetch(`${API}/api/recordings?${p}`).then(r=>r.json());
      scroll.innerHTML = '';
      if (!recs.length) { scroll.innerHTML = '<div class="panel-msg">no sounds yet in this timeframe ♩</div>'; return; }

      recs.forEach((rec, i) => {
        const color = dotColor(rec.tags);
        const item  = el('div', { class:'tl-item' });
        item.style.animationDelay = `${i * 0.05}s`;

        const dot  = el('div', { class:'tl-dot' });
        dot.style.color      = color;
        dot.style.background = color;

        const track = el('div', { class:'tl-track' }, dot, el('div',{class:'tl-line'}));

        const tagsEl = el('div', { class:'tl-tags' });
        (rec.tags||[]).forEach(t => {
          const c    = tagColor(t);
          const chip = el('span', { class:'tl-tag' }, t);
          chip.style.background = c.bg;
          chip.style.color      = c.fg;
          tagsEl.appendChild(chip);
        });

        const audioWrap = el('div', { class:'tl-audio-wrap' });
        const audio     = el('audio', { controls:'', src:`${API}/uploads/${rec.filename}`, preload:'none' });
        audioWrap.appendChild(audio);

        const body = el('div', { class:'tl-body' },
          el('div', { class:'tl-time' }, fmtTime(rec.timestamp)),
          tagsEl,
          audioWrap
        );

        item.onclick = () => {
          const isOpen = audioWrap.classList.contains('open');
          if (openAudio && openAudio !== audioWrap) {
            openAudio.classList.remove('open');
            openAudio.querySelector('audio').pause();
          }
          if (isOpen) {
            audioWrap.classList.remove('open');
            audio.pause(); openAudio = null;
          } else {
            audioWrap.classList.add('open');
            audio.play().catch(()=>{});
            openAudio = audioWrap;
          }
        };

        item.append(track, body);
        scroll.appendChild(item);
      });
    } catch { scroll.innerHTML = '<div class="panel-msg">couldn\'t load sounds</div>'; }
  }

  const tfOpts = [['all','All'],['1h','1h'],['24h','24h'],['7d','7d'],['30d','30d']];
  for (const [v,l] of tfOpts) {
    tfBar.appendChild(el('button', {
      class: `tf-btn${v==='all'?' active':''}`,
      onclick(e) {
        tfBar.querySelectorAll('.tf-btn').forEach(x=>x.classList.remove('active'));
        e.currentTarget.classList.add('active');
        loadRecs(v);
      }
    }, l));
  }

  timelineUnmount = mount(panel);
  loadRecs('all');
}

function openRecordModal() {
  const DURATION = 8;
  let phase = 'idle', location = null, audioBlob = null, audioUrl = null;
  let tags = [], recorder = null, timer = null;

  const NYC_SPOTS = [[40.7128,-74.006],[40.758,-73.9855],[40.7282,-73.7949],[40.6501,-73.9496],[40.8448,-73.8648]];
  const defLoc = () => { const [la,ln]=NYC_SPOTS[Math.floor(Math.random()*NYC_SPOTS.length)]; return {lat:la+(Math.random()-.5)*.008,lng:ln+(Math.random()-.5)*.008}; };

  const overlay  = el('div', { class:'overlay', onclick:()=>{ if(phase==='idle'||phase==='review') close(); } });
  const modal    = el('div', { class:'modal', onclick:e=>e.stopPropagation() });
  const closeBtn = el('button', { class:'modal-close', onclick:close }, '×');
  const title    = el('h2', {}, '● record a sound');
  const locNote  = el('p',  { class:'loc-note' }, 'Locating…');
  const body     = el('div', {});
  modal.append(closeBtn, title, locNote, body);
  overlay.appendChild(modal);
  const unmount = mount(overlay);

  function close() { if(recorder?.state==='recording'){clearInterval(timer);recorder.stop();} unmount(); }

  navigator.geolocation.getCurrentPosition(
    pos=>{ location={lat:pos.coords.latitude,lng:pos.coords.longitude}; locNote.textContent=`📍 ${location.lat.toFixed(4)}, ${location.lng.toFixed(4)}`; },
    ()=>{ location=defLoc(); locNote.textContent='📍 approximate NYC location'; },
    { timeout:6000 }
  );

  function renderIdle() {
    body.innerHTML='';
    const ring=el('div',{class:'rec-ring',onclick:startRec},el('span',{class:'rec-icon'},'●'),el('span',{class:'rec-label'},'TAP TO RECORD'));
    body.appendChild(el('div',{class:'rec-center'},ring,el('p',{class:'rec-hint'},'8-second clip · your mic')));
  }
  function renderRecording(count) {
    body.innerHTML='';
    const ring=el('div',{class:'rec-ring active',onclick:stopEarly},el('span',{class:'rec-count',id:'rcount'},String(count)),el('span',{class:'rec-label'},'RECORDING'));
    const bars=el('div',{class:'wave-bars'});
    for(let i=0;i<20;i++){const b=el('div',{class:'wave-bar'});b.style.animationDelay=`${i*.04}s`;b.style.animationDuration=`${.5+Math.random()*.4}s`;bars.appendChild(b);}
    body.appendChild(el('div',{class:'rec-center'},ring,bars));
  }
  function renderReview() {
    body.innerHTML='';
    const aud=el('audio',{controls:'',src:audioUrl});
    const inp=el('input',{placeholder:'add tags: traffic, music, birds…'});
    inp.addEventListener('keydown',e=>e.key==='Enter'&&addTag());
    const addBtn=el('button',{class:'btn-add',onclick:addTag},'+');
    const wrap=el('div',{class:'tags-wrap'});
    function addTag(){
      const t=inp.value.trim().toLowerCase().replace(/\s+/g,'-');
      if(t&&!tags.includes(t)){tags.push(t);renderTags();}
      inp.value='';
    }
    function renderTags(){
      wrap.innerHTML='';
      tags.forEach(t=>{
        const c=tagColor(t);
        const chip=el('span',{class:'tag-chip',onclick:()=>{tags=tags.filter(x=>x!==t);renderTags();}},`${t} ×`);
        chip.style.background=c.bg; chip.style.color=c.fg;
        wrap.appendChild(chip);
      });
    }
    body.appendChild(el('div',{class:'rec-review'},aud,el('div',{class:'tag-row'},inp,addBtn),wrap,
      el('div',{class:'review-actions'},
        el('button',{class:'btn btn-ghost',onclick:()=>{audioUrl=null;audioBlob=null;tags=[];renderIdle();}},'re-record'),
        el('button',{class:'btn btn-primary',onclick:submit},'submit ♪')
      )
    ));
  }
  function renderUploading(){body.innerHTML='';body.appendChild(el('div',{class:'spinner-wrap'},el('div',{class:'spinner'}),el('span',{},'pinning to the map…')));}

  async function startRec(){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      recorder=new MediaRecorder(stream);
      const chunks=[];
      recorder.ondataavailable=e=>chunks.push(e.data);
      recorder.onstop=()=>{audioBlob=new Blob(chunks,{type:'audio/webm'});audioUrl=URL.createObjectURL(audioBlob);stream.getTracks().forEach(t=>t.stop());phase='review';renderReview();};
      recorder.start(); phase='recording'; let count=DURATION; renderRecording(count);
      timer=setInterval(()=>{count--;const e2=document.getElementById('rcount');if(e2)e2.textContent=count;if(count<=0){clearInterval(timer);recorder.stop();}},1000);
    }catch{alert('Microphone access is required.');}
  }
  function stopEarly(){clearInterval(timer);if(recorder?.state==='recording')recorder.stop();}

  async function submit(){
    if(!audioBlob||!location)return; phase='uploading'; renderUploading();
    const fd=new FormData();
    fd.append('audio',audioBlob,'recording.webm');
    fd.append('lat',location.lat); fd.append('lng',location.lng);
    fd.append('tags',JSON.stringify(tags));
    fd.append('timestamp',new Date().toISOString());
    try{
      const res=await fetch(`${API}/api/recordings`,{method:'POST',body:fd});
      if(res.ok){ drawGrid(); spawnRipple(location.lat,location.lng); unmount(); }
      else{alert('Upload failed. Is the server running?');phase='review';renderReview();}
    }catch{alert('Cannot reach the server on port 8000.');phase='review';renderReview();}
  }

  renderIdle();
}

/* ── Waveform skyline: the city as one continuous audio signal ── */
document.getElementById('btn-sky').addEventListener('click', openSkyline);
let skyClose = null;

async function openSkyline() {
  if (skyClose) { skyClose(); return; }

  const overlay = el('div', { class: 'skyline-overlay' });
  const head = el('div', { class: 'sky-head' },
    el('div', {},
      el('h3', {}, 'the city, west to east'),
      el('p', {}, 'every recording drawn as its actual waveform, placed at its longitude — click a burst to listen')),
    el('button', { class: 'sky-close', onclick: () => skyClose && skyClose() }, '×')
  );
  const wrap = el('div', { class: 'sky-canvas-wrap' });
  const canvas = el('canvas', { class: 'sky-canvas' });
  const tip = el('div', { class: 'sky-tip' });
  const status = el('div', { class: 'sky-status' }, 'decoding the city…');
  wrap.append(canvas, tip, status);
  overlay.append(head, wrap);
  document.body.appendChild(overlay);

  let player = null, raf = null, segments = [], playingIdx = -1;
  skyClose = () => {
    if (player) { player.pause(); player = null; }
    if (raf) cancelAnimationFrame(raf);
    window.removeEventListener('resize', draw);
    overlay.remove(); skyClose = null;
  };

  // fetch + decode every recording
  let clips = [];
  try {
    const recs = await fetch(`${API}/api/recordings`).then(r => r.json());
    if (!recs.length) { status.textContent = 'no recordings yet'; return; }
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    clips = (await Promise.all(recs.slice(0, 24).map(async rec => {
      try {
        const ab = await fetch(`${API}/uploads/${rec.filename}`).then(r => r.arrayBuffer());
        const buf = await AC.decodeAudioData(ab);
        return { rec, buf };
      } catch { return null; }
    }))).filter(Boolean);
    await AC.close();
  } catch { status.textContent = 'could not load recordings'; return; }
  if (!clips.length) { status.textContent = 'could not decode recordings'; return; }
  status.remove();

  clips.sort((a, b) => a.rec.lng - b.rec.lng);
  const lngs = clips.map(c => c.rec.lng);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs), span = maxLng - minLng || 1;

  function layout(W) {
    const padL = 50, padR = 50, gap = 22;
    const n = clips.length;
    // guarantee everything fits with visible flat line between bursts
    const segW = Math.max(28, Math.min(110, (W - padL - padR - gap * (n - 1)) / n));
    segments = clips.map(c => ({
      c, w: segW,
      x: padL + ((c.rec.lng - minLng) / span) * (W - padL - padR - segW),
    }));
    // forward pass: enforce minimum gap left→right
    for (let i = 1; i < n; i++) {
      const prev = segments[i - 1];
      if (segments[i].x < prev.x + prev.w + gap) segments[i].x = prev.x + prev.w + gap;
    }
    // backward pass: clamp to right edge, push earlier segments left if needed
    segments[n - 1].x = Math.min(segments[n - 1].x, W - padR - segW);
    for (let i = n - 2; i >= 0; i--) {
      const next = segments[i + 1];
      if (segments[i].x + segW + gap > next.x) segments[i].x = next.x - gap - segW;
    }
  }

  function draw(highlightIdx = -1, playX = null) {
    const W = wrap.clientWidth, H = wrap.clientHeight, dpr = devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);
    layout(W);

    const base = H * 0.5, amp = H * 0.3;
    ctx.lineWidth = 1.3; ctx.lineJoin = 'round'; ctx.strokeStyle = '#111';
    ctx.beginPath();
    ctx.moveTo(0, base);
    for (let si = 0; si < segments.length; si++) {
      const { c, x, w } = segments[si];
      ctx.lineTo(x, base);
      const raw = c.buf.getChannelData(0);
      let peak = 0; for (let i = 0; i < raw.length; i += 50) peak = Math.max(peak, Math.abs(raw[i]));
      const norm = peak ? 0.95 / peak : 1;
      const pts = Math.floor(w * 2);
      for (let i = 0; i < pts; i++) {
        const v = raw[Math.floor(i * raw.length / pts)] * norm;
        ctx.lineTo(x + (i / pts) * w, base - v * amp * (si === highlightIdx ? 1 : 0.85));
      }
      ctx.lineTo(x + w, base);
    }
    ctx.lineTo(W, base);
    ctx.stroke();

    // labels + highlight underline
    ctx.textAlign = 'center';
    for (let si = 0; si < segments.length; si++) {
      const { c, x, w } = segments[si];
      const hi = si === highlightIdx || si === playingIdx;
      const ly = base + amp + (si % 2 ? 44 : 26); // stagger rows so labels never collide
      ctx.fillStyle = hi ? '#111' : '#9a9a9a';
      ctx.font = `${hi ? '700 ' : ''}10px Inter, sans-serif`;
      ctx.fillText(((c.rec.tags && c.rec.tags[0]) || 'sound').toUpperCase(), x + w / 2, ly);
      if (hi) {
        ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, ly + 7); ctx.lineTo(x + w, ly + 7); ctx.stroke();
        ctx.lineWidth = 1.3;
      }
    }
    // west/east markers
    ctx.fillStyle = '#c2c2c2'; ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'left';  ctx.fillText('W ◀', 18, base - amp - 14);
    ctx.textAlign = 'right'; ctx.fillText('▶ E', W - 18, base - amp - 14);

    // playhead
    if (playX !== null) {
      ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(playX, base - amp - 4); ctx.lineTo(playX, base + amp + 8); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function segAt(mx) {
    return segments.findIndex(s => mx >= s.x - 4 && mx <= s.x + s.w + 4);
  }

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    const idx = segAt(e.clientX - r.left);
    canvas.style.cursor = idx >= 0 ? 'pointer' : 'default';
    if (idx >= 0) {
      const { c, x, w } = segments[idx];
      tip.textContent = `${(c.rec.tags || []).join(' · ')} — ${new Date(c.rec.timestamp).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}`;
      tip.style.left = (x + w / 2) + 'px';
      tip.style.top = (wrap.clientHeight * 0.5 - wrap.clientHeight * 0.3 - 8) + 'px';
      tip.style.opacity = 1;
    } else tip.style.opacity = 0;
    if (playingIdx < 0) draw(idx);
  });
  canvas.addEventListener('mouseleave', () => { tip.style.opacity = 0; if (playingIdx < 0) draw(); });

  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    const idx = segAt(e.clientX - r.left);
    if (idx < 0) return;
    if (player) { player.pause(); player = null; }
    if (raf) cancelAnimationFrame(raf);
    playingIdx = idx;
    const seg = segments[idx];
    player = new Audio(`${API}/uploads/${seg.c.rec.filename}`);
    player.play();
    const step = () => {
      if (!player || player.ended || player.paused) { playingIdx = -1; draw(); return; }
      draw(idx, seg.x + (player.currentTime / (player.duration || 1)) * seg.w);
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
  });

  window.addEventListener('resize', () => draw());
  draw();
}

document.getElementById('btn-gen').addEventListener('click', openMusicPanel);
let musicUnmount = null;

/* ── Pitch detection & scale helpers ── */
const MUSIC_SCALES = {
  major:      { intervals:[0,2,4,5,7,9,11], label:'major' },
  minor:      { intervals:[0,2,3,5,7,8,10], label:'minor' },
  dorian:     { intervals:[0,2,3,5,7,9,10], label:'dorian' },
  phrygian:   { intervals:[0,1,3,5,7,8,10], label:'phrygian' },
  lydian:     { intervals:[0,2,4,6,7,9,11], label:'lydian' },
  pentatonic: { intervals:[0,2,4,7,9],      label:'pentatonic' },
};
const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

function getScaleForTags(tags) {
  const t = (tags||[]).join(' ').toLowerCase();
  if (/bird|nature|park|tree|wind|forest/.test(t))  return { root:67, ...MUSIC_SCALES.major,      display:'G major' };
  if (/music|sing|drum|guitar|jazz|band/.test(t))   return { root:69, ...MUSIC_SCALES.dorian,     display:'A dorian' };
  if (/child|kids|play|laugh/.test(t))              return { root:60, ...MUSIC_SCALES.pentatonic, display:'C pentatonic' };
  if (/mystery|chime|strange|eerie/.test(t))        return { root:59, ...MUSIC_SCALES.phrygian,   display:'B phrygian' };
  if (/water|rain|river|ocean|fountain/.test(t))    return { root:64, ...MUSIC_SCALES.lydian,     display:'E lydian' };
  if (/traffic|car|truck|subway|bus|horn/.test(t))  return { root:62, ...MUSIC_SCALES.minor,      display:'D minor' };
  if (/voice|talk|people|crowd|shout/.test(t))      return { root:65, ...MUSIC_SCALES.dorian,     display:'F dorian' };
  return { root:60, ...MUSIC_SCALES.major, display:'C major' };
}

function detectPitch(samples, sr) {
  const N = samples.length;
  const minTau = Math.floor(sr / 1200);
  const maxTau = Math.min(Math.floor(sr / 60), Math.floor(N * 0.48));
  let bestR = 0, bestTau = -1;
  for (let tau = minTau; tau <= maxTau; tau++) {
    let num = 0, den = 0;
    const len = N - tau;
    for (let i = 0; i < len; i++) {
      num += samples[i] * samples[i + tau];
      den += samples[i] * samples[i] + samples[i + tau] * samples[i + tau];
    }
    const r = den > 1e-10 ? 2 * num / den : 0;
    if (r > bestR) { bestR = r; bestTau = tau; }
  }
  return bestR > 0.3 && bestTau > 0 ? sr / bestTau : null;
}

function freqToMidi(freq) { return Math.round(12 * Math.log2(freq / 440) + 69); }

function quantizeToScale(midi, root, intervals) {
  while (midi < 48) midi += 12;
  while (midi > 84) midi -= 12;
  const semis = ((midi - root) % 12 + 12) % 12;
  let nearest = intervals[0], minD = 12;
  for (const iv of intervals) {
    const d = Math.min(Math.abs(semis - iv), 12 - Math.abs(semis - iv));
    if (d < minD) { minD = d; nearest = iv; }
  }
  const base = ((root % 12) + 12) % 12;
  const oct = Math.floor((midi - base) / 12);
  return base + oct * 12 + nearest;
}

function midiToName(midi) {
  return NOTE_NAMES[((midi % 12) + 12) % 12] + (Math.floor(midi / 12) - 1);
}

function openMusicPanel() {
  if (musicUnmount) { musicUnmount(); musicUnmount=null; }
  if (timelineUnmount) { timelineUnmount(); timelineUnmount=null; if(activeHighlight){activeHighlight.remove();activeHighlight=null;} }

  const panel=el('div',{class:'panel'});
  const head=el('div',{class:'panel-head'},
    el('div',{},el('h3',{},'city house'),el('p',{},'a house track built from real recordings')),
    el('button',{class:'panel-close',onclick:()=>{musicUnmount();musicUnmount=null;}},'×')
  );
  const body=el('div',{class:'gen-body'});
  panel.append(head,body);

  let currentTf='24h';
  const tfBar=el('div',{class:'tf-bar',style:'padding:0;border:none;'});
  for(const [v,l] of [['1h','Last hour'],['24h','Last 24h'],['7d','Last 7 days'],['30d','Last 30 days'],['all','All time']]){
    tfBar.appendChild(el('button',{class:`tf-btn${v==='24h'?' active':''}`,onclick(e){tfBar.querySelectorAll('.tf-btn').forEach(x=>x.classList.remove('active'));e.currentTarget.classList.add('active');currentTf=v;}},l));
  }

  const howEl=el('p',{},'Builds a house track (118–126 BPM) from the recordings themselves. A four-on-the-floor kick, offbeat hats and claps set the groove; one clip becomes a low-pass filtered atmosphere that pumps with the kick, while the others are chopped into short slices and triggered on the beat grid — panned by where they were recorded. A synth bassline follows the pitch detected in the clips. Tempo, swing, patterns and the featured atmosphere are dealt fresh from the clip set every run — change the timeframe or just press again for a new take.');
  const statusEl=el('div',{class:'gen-status'});
  const genBtn=el('button',{class:'btn-generate',onclick:generate},'▶ generate house track');
  const resultWrap=el('div',{});

  body.append(el('div',{},el('label',{},'timeframe'),tfBar),el('div',{},el('label',{},'how it works'),howEl),statusEl,genBtn,resultWrap);
  musicUnmount=mount(panel);

  async function generate(){
    genBtn.disabled=true; resultWrap.innerHTML=''; setStatus('fetching recordings…');
    try{
      const p=new URLSearchParams({south:'40.4774',north:'40.9176',west:'-74.2591',east:'-73.7004'});
      if(currentTf!=='all') p.append('since',sinceDate(currentTf));
      const recs=await fetch(`${API}/api/recordings?${p}`).then(r=>r.json());
      if(!recs.length){setStatus('no recordings yet — add some sounds first!');genBtn.disabled=false;return;}

      const sample=recs.slice(0,10);
      setStatus(`loading & analyzing ${sample.length} clips…`);

      const AC=new (window.AudioContext||window.webkitAudioContext)();
      const clips=(await Promise.all(sample.map(async rec=>{
        try{
          const ab=await fetch(`${API}/uploads/${rec.filename}`).then(r=>r.arrayBuffer());
          const buf=await AC.decodeAudioData(ab);
          const raw=buf.getChannelData(0), sr=buf.sampleRate;
          // onset candidates: top-energy 0.3s windows, spaced ≥0.5s apart
          const win=Math.floor(sr*0.3), hop=Math.floor(sr*0.1);
          const cands=[];
          for(let i=0;i<raw.length-win;i+=hop){
            let e=0; for(let j=0;j<win;j+=8) e+=raw[i+j]**2;
            cands.push({off:i,e});
          }
          cands.sort((a,b)=>b.e-a.e);
          const onsets=[];
          for(const c of cands){
            if(onsets.every(o=>Math.abs(o-c.off)>sr*0.5)) onsets.push(c.off);
            if(onsets.length>=4) break;
          }
          // pitch of loudest window → for the bassline root
          const seg=raw.slice(cands[0].off,cands[0].off+4096);
          const freq=detectPitch(seg,sr);
          return {rec,buf,onsets:onsets.length?onsets:[0],freq};
        }catch{return null;}
      }))).filter(Boolean);
      await AC.close();
      if(!clips.length){setStatus('could not decode any recordings');genBtn.disabled=false;return;}

      // ── seeded rng: which clips are in the set AND which run this is both matter,
      //    so a different timeframe (or another press of the button) gives a new groove ──
      let seed=2166136261;
      const mix=str=>{for(let i=0;i<str.length;i++){seed^=str.charCodeAt(i);seed=Math.imul(seed,16777619)>>>0;}};
      clips.forEach(c=>mix(c.rec.id||c.rec.filename));
      mix(currentTf); mix(String(Date.now()>>>10));
      const rand=()=>{seed=(Math.imul(seed,1103515245)+12345)>>>0;return (seed>>>8)/0x1000000;};
      const pick=arr=>arr[Math.floor(rand()*arr.length)];

      // ── seeded musical personality ──
      const BPM=118+Math.floor(rand()*5)*2;             // 118–126
      const BEAT=60/BPM, BARS=16, TOTAL=BARS*4*BEAT+2;
      const SWING=rand()*0.1;                           // offbeat push, 0–10% of a beat
      const SIXTEENTHS=rand()<0.6;                      // hat sprinkle on/off
      const ATMO_LP=500+rand()*900;                     // atmosphere darkness
      const DUCK=0.08+rand()*0.14;                      // sidechain depth
      const CHOP_DENSITY=rand();                        // sparse ↔ busy chops
      setStatus(`sequencing ${BPM} BPM…`);

      const SR=44100;
      const off=new OfflineAudioContext(2,Math.ceil(SR*TOTAL),SR);
      const t0=0.05;
      const beatAt=(bar,beat)=>t0+(bar*4+beat)*BEAT;

      // ── master chain: compressor → fade gain → destination ──
      const comp=off.createDynamicsCompressor();
      comp.threshold.value=-14; comp.ratio.value=4; comp.attack.value=0.004; comp.release.value=0.18;
      const master=off.createGain();
      master.gain.setValueAtTime(0,0);
      master.gain.linearRampToValueAtTime(0.9,1.2);
      master.gain.setValueAtTime(0.9,TOTAL-2.2);
      master.gain.linearRampToValueAtTime(0,TOTAL-0.1);
      comp.connect(master); master.connect(off.destination);

      // bar roles: intro 0-1, build 2-3, main 4-13, outro 14-15
      const hasKick=b=>b>=2&&b<15, hasBass=b=>b>=4&&b<14, hasClap=b=>b>=4&&b<14, hasChops=b=>b>=2;

      // ── drums ──
      const drumBus=off.createGain(); drumBus.gain.value=1; drumBus.connect(comp);
      function kick(t){
        const o=off.createOscillator(), g=off.createGain();
        o.frequency.setValueAtTime(150,t);
        o.frequency.exponentialRampToValueAtTime(45,t+0.12);
        g.gain.setValueAtTime(1.0,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
        o.connect(g); g.connect(drumBus); o.start(t); o.stop(t+0.3);
        // click transient
        const n=off.createBufferSource(), nb=off.createBuffer(1,220,SR);
        const d=nb.getChannelData(0); for(let i=0;i<220;i++)d[i]=(Math.random()*2-1)*(1-i/220);
        n.buffer=nb;
        const ng=off.createGain(); ng.gain.value=0.25;
        n.connect(ng); ng.connect(drumBus); n.start(t);
      }
      const noiseBuf=off.createBuffer(1,SR,SR);
      { const d=noiseBuf.getChannelData(0); for(let i=0;i<SR;i++)d[i]=Math.random()*2-1; }
      function hat(t,open){
        const s=off.createBufferSource(); s.buffer=noiseBuf;
        const hp=off.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8200;
        const g=off.createGain();
        const dur=open?0.14:0.045;
        g.gain.setValueAtTime(open?0.32:0.25,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        s.connect(hp); hp.connect(g); g.connect(drumBus);
        s.start(t,rand()*0.4); s.stop(t+dur+0.02);
      }
      function clap(t){
        for(const dt of [0,0.012,0.026]){
          const s=off.createBufferSource(); s.buffer=noiseBuf;
          const bp=off.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=1.1;
          const g=off.createGain();
          g.gain.setValueAtTime(dt===0.026?0.5:0.28,t+dt);
          g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.12);
          s.connect(bp); bp.connect(g); g.connect(drumBus);
          s.start(t+dt,rand()*0.4); s.stop(t+dt+0.15);
        }
      }
      const openHatEvery=pick([2,4,4,8]); // how often the open-hat turnaround lands
      for(let bar=0;bar<BARS;bar++){
        for(let b=0;b<4;b++){
          const t=beatAt(bar,b);
          if(hasKick(bar)) kick(t);
          hat(t+BEAT*(0.5+SWING),false);             // classic offbeat hat, swung
          if(SIXTEENTHS&&bar>=6&&bar<14&&b%2===1) hat(t+BEAT*0.25,false);
          if(hasClap(bar)&&(b===1||b===3)) clap(t);
          if(bar>=4&&bar<14&&b===3&&bar%openHatEvery===openHatEvery-1) hat(t+BEAT*(0.5+SWING),true);
        }
      }

      // ── bassline: root from detected pitch, offbeat eighths ──
      const pitched=clips.find(c=>c.freq&&c.freq>60&&c.freq<2000);
      let rootMidi=pitched?freqToMidi(pitched.freq):45;
      while(rootMidi>45)rootMidi-=12; while(rootMidi<33)rootMidi+=12;
      const bassBus=off.createGain(); bassBus.gain.value=0.55; bassBus.connect(comp);
      const bassPattern=pick([                 // minor-flavored 2-bar patterns
        [0,0,7,0, 0,10,7,3],
        [0,3,0,7, 0,3,10,7],
        [0,0,0,5, 0,0,3,7],
        [0,7,3,7, 0,7,5,10],
        [0,0,12,0, 0,10,0,7],
      ]);
      function bassNote(t,midi,dur){
        const o=off.createOscillator(); o.type='sawtooth';
        o.frequency.value=440*Math.pow(2,(midi-69)/12);
        const lp=off.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=6;
        lp.frequency.setValueAtTime(900,t);
        lp.frequency.exponentialRampToValueAtTime(220,t+dur);
        const g=off.createGain();
        g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.5,t+0.012);
        g.gain.setValueAtTime(0.5,t+dur-0.04); g.gain.linearRampToValueAtTime(0,t+dur);
        o.connect(lp); lp.connect(g); g.connect(bassBus);
        o.start(t); o.stop(t+dur+0.02);
      }
      for(let bar=0;bar<BARS;bar++){
        if(!hasBass(bar)) continue;
        for(let b=0;b<4;b++){
          const iv=bassPattern[((bar%2)*4+b)];
          bassNote(beatAt(bar,b)+BEAT*(0.5+SWING),rootMidi+iv,BEAT*0.42); // offbeat house bass, swung
        }
      }

      // ── atmosphere: longest clip, low-passed loop, sidechain-pumped ──
      const lngs=clips.map(c=>c.rec.lng);
      const minLng=Math.min(...lngs),maxLng=Math.max(...lngs),lngSpan=maxLng-minLng||1;
      // atmosphere: seeded pick among the longer clips, so different sets/runs feature different beds
      const longIdxs=clips.map((c,i)=>i).filter(i=>clips[i].buf.duration>=5);
      const atmoIdx=longIdxs.length?pick(longIdxs):clips.reduce((mi,c,i)=>c.buf.duration>clips[mi].buf.duration?i:mi,0);
      {
        const c=clips[atmoIdx];
        const s=off.createBufferSource(); s.buffer=c.buf; s.loop=true;
        const lp=off.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=ATMO_LP;
        const duck=off.createGain();
        // sidechain pump: duck hard on every beat, swell back before the next
        for(let bar=0;bar<BARS;bar++)for(let b=0;b<4;b++){
          const t=beatAt(bar,b);
          duck.gain.setValueAtTime(hasKick(bar)?DUCK:0.3,t);
          duck.gain.linearRampToValueAtTime(0.34,t+BEAT*0.72);
        }
        const g=off.createGain(); g.gain.value=1;
        s.connect(lp); lp.connect(duck); duck.connect(g); g.connect(comp);
        s.start(t0);
      }

      // ── clip chops on the beat grid ──
      const chopBus=off.createGain(); chopBus.gain.value=0.9; chopBus.connect(comp);
      // shuffled order so a different clip fronts each bar across runs
      const chopClips=clips.filter((_,i)=>i!==atmoIdx)
        .map(c=>({c,k:rand()})).sort((a,b)=>a.k-b.k).map(x=>x.c);
      const chopCount=new Array(clips.length).fill(0);
      // step-pattern pool (in beats); density decides sparse vs busy bars
      const patternPool=[
        [1,2.5],[0.5,2,3.5],[1.5,3],[0.75,2.25,3.5],
        [2],[0.5,1.5,2.5,3.5],[1,1.75,3],[0.25,2,2.75],
      ];
      const patterns=[];
      for(let k=0;k<4;k++){
        const p=pick(patternPool);
        patterns.push(CHOP_DENSITY<0.35?p.slice(0,Math.max(1,p.length-1)):p);
      }
      for(let bar=0;bar<BARS;bar++){
        if(!hasChops(bar)||!chopClips.length) continue;
        const clip=chopClips[bar%chopClips.length];
        const i=clips.indexOf(clip);
        const pat=patterns[bar%patterns.length];
        for(const stepBeat of pat){
          const t=beatAt(bar,stepBeat+(stepBeat%1!==0?SWING:0));
          const onset=clip.onsets[Math.floor(rand()*clip.onsets.length)];
          const dur=BEAT*(rand()<0.3?0.9:0.45);
          const s=off.createBufferSource(); s.buffer=clip.buf;
          const pan=off.createStereoPanner();
          pan.pan.value=Math.max(-0.85,Math.min(0.85,((clip.rec.lng-minLng)/lngSpan)*2-1));
          const g=off.createGain();
          g.gain.setValueAtTime(0,t);
          g.gain.linearRampToValueAtTime(0.85,t+0.015);
          g.gain.setValueAtTime(0.85,t+dur-0.05);
          g.gain.linearRampToValueAtTime(0,t+dur);
          s.connect(g); g.connect(pan); pan.connect(chopBus);
          s.start(t,onset/clip.buf.sampleRate,dur+0.05);
          chopCount[i]++;
        }
      }

      setStatus('rendering…');
      const rendered=await off.startRendering();
      const wav=encodeWav(rendered);
      const url=URL.createObjectURL(new Blob([wav],{type:'audio/wav'}));

      setStatus('');
      resultWrap.innerHTML='';
      resultWrap.appendChild(el('div',{style:'font-size:11px;color:var(--ink-light);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;'},
        `${BPM} bpm · ${BARS} bars · ${clips.length} recordings`));

      const vizRow=el('div',{style:'display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;'});
      clips.forEach((c,i)=>{
        const role=i===atmoIdx?'atmosphere':`${chopCount[i]} chops`;
        const pan=((c.rec.lng-minLng)/lngSpan)*2-1;
        const panLbl=pan<-0.3?'◀ L':pan>0.3?'R ▶':'· C ·';
        vizRow.appendChild(el('div',{style:'display:flex;flex-direction:column;align-items:center;gap:1px;background:var(--cream);border:1px solid var(--border-med);border-radius:8px;padding:5px 9px;'},
          el('span',{style:'font-family:Space Grotesk,Inter,sans-serif;font-size:12px;font-weight:700;color:var(--ink);line-height:1.2;'},(c.rec.tags&&c.rec.tags[0])||'sound'),
          el('span',{style:'font-size:9px;color:var(--ink-light);'},role),
          el('span',{style:'font-size:9px;color:var(--ink-light);'},panLbl)
        ));
      });
      resultWrap.appendChild(vizRow);
      resultWrap.appendChild(el('div',{class:'gen-result'},
        el('h4',{},`✓ house track from ${clips.length} city sounds`),
        el('audio',{controls:'',src:url}),
        el('a',{class:'btn-dl',href:url,download:'city-house.wav'},'↓ download wav')
      ));
    }catch(e){console.error(e);setStatus(`error: ${e.message}`);}
    genBtn.disabled=false;
  }
  function setStatus(s){statusEl.innerHTML=s?`<span class="spinner-sm"></span>${s}`:'';}
}

/* ── Audio utils ── */
function encodeWav(buf){
  const ch=buf.numberOfChannels,sr=buf.sampleRate,len=buf.length;
  const ab=new ArrayBuffer(44+len*ch*2),v=new DataView(ab);
  const s=(o,str)=>{for(let i=0;i<str.length;i++)v.setUint8(o+i,str.charCodeAt(i));};
  s(0,'RIFF');v.setUint32(4,36+len*ch*2,true);s(8,'WAVE');s(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,ch,true);v.setUint32(24,sr,true);v.setUint32(28,sr*ch*2,true);v.setUint16(32,ch*2,true);v.setUint16(34,16,true);
  s(36,'data');v.setUint32(40,len*ch*2,true);
  let off=44;
  for(let i=0;i<len;i++)for(let c=0;c<ch;c++){const x=Math.max(-1,Math.min(1,buf.getChannelData(c)[i]));v.setInt16(off,x<0?x*0x8000:x*0x7fff,true);off+=2;}
  return ab;
}
