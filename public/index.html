<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sound in NYC</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #fafafa;
  --white: #ffffff;
  --ink: #111111;
  --ink-light: #767676;
  --border: rgba(0,0,0,0.10);
  --border-med: rgba(0,0,0,0.18);
  --primary: #111111;
  --primary-dark: #000000;
  --primary-soft: #efefef;
  --accent-teal: #444444;
  --accent-yellow: #555555;
  --accent-pink: #555555;
  --accent-purple: #555555;
  --accent-orange: #555555;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 14px;
}
html, body { height: 100%; overflow: hidden; background: var(--cream); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; }


#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px; background: #fff;
  border-bottom: 1px solid #e8e8e8; flex-shrink: 0; z-index: 1000;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-text {
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  font-size: 21px; font-weight: 500; color: #111;
  letter-spacing: 0; line-height: 1;
  position: relative; display: inline-block;
}
/* white circular cutouts at letter joints, like the reference logo */
.logo-dot {
  position: absolute; width: 3.2px; height: 3.2px;
  background: #fff; border-radius: 50%; pointer-events: none;
  transform: translate(-50%, -50%);
}
.logo-icon { display: block; height: 28px; width: auto; color: #111; }

.header-actions { display: flex; align-items: center; gap: 8px; }

.btn { font-family: 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 100px; transition: opacity .15s, background .15s; }
.btn:active { opacity: 0.75; }

/* generation tools: same pill family as NYC/record, grey fill = generative */
.btn-tool {
  background: #ededed; color: #111; border: 1.5px solid transparent;
  padding: 7px 16px; display: flex; align-items: center; gap: 6px;
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  font-weight: 700; font-size: 13px;
  transition: background .15s, color .15s;
}
.btn-tool:hover { background: #111; color: #fff; }
.btn-tool .tool-glyph { font-size: 14px; line-height: 1; }

.city-picker { position: relative; }
.btn-city {
  background: #fff; color: #111; border: 1.5px solid #111;
  padding: 7px 16px; display: flex; align-items: center; gap: 6px;
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  font-weight: 700; font-size: 13px;
}
.btn-city:hover { background: #f5f5f5; }
.btn-city-arrow { font-size: 9px; opacity: 0.55; transition: transform .18s; }
.btn-city.open .btn-city-arrow { transform: rotate(180deg); }

.city-dropdown {
  display: none; position: absolute; top: calc(100% + 6px); right: 0;
  background: #fff; border: 1.5px solid #111; border-radius: 12px;
  overflow: hidden; min-width: 160px; z-index: 2000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
.city-dropdown.open { display: block; }
.city-opt {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
  font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  color: #111; transition: background .12s;
}
.city-opt:hover { background: #f5f5f5; }
.city-opt.active { font-weight: 700; }
.city-opt-check { font-size: 11px; color: #111; opacity: 0; }
.city-opt.active .city-opt-check { opacity: 1; }
.city-opt-tag {
  font-size: 10px; font-weight: 500; background: #111; color: #fff;
  border-radius: 4px; padding: 1px 5px; letter-spacing: 0.5px;
}
.city-divider { height: 1px; background: #e8e8e8; margin: 0 12px; }

.btn-rec {
  background: #111; color: #fff; border: none;
  padding: 8px 20px; letter-spacing: 0.2px;
}
.btn-rec:hover { background: #333; }

/* ── Map ── */
#map-wrap { flex: 1; position: relative; min-height: 0; }
#map { width: 100%; height: 100%; }

/*
 * Pencil sketch style:
 * Positron tiles are already grey ink on white — like a clean technical drawing.
 * sepia(0.3) shifts the grey lines to warm ink-brown. contrast + brightness
 * lift the paper to cream and crisp the lines. Result: architect's field sketch.
 */
.leaflet-tile-pane {
  filter: grayscale(1) contrast(1.32) brightness(1.05);
}

.leaflet-container { background: #f4f4f2 !important; font-family: 'Inter', sans-serif !important; }
.leaflet-control-zoom a { background: rgba(255,255,255,0.92) !important; color: var(--ink) !important; border: 1.5px solid var(--border-med) !important; font-family: 'Inter', sans-serif !important; font-size: 15px !important; }
.leaflet-control-attribution { background: rgba(255,255,255,0.75) !important; font-size: 9px !important; }

.zoom-pill {
  position: absolute; bottom: 28px; left: 16px; z-index: 900; pointer-events: none;
  background: rgba(255,255,255,0.88); border: 1px solid var(--border-med); border-radius: 100px;
  padding: 4px 12px; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 11px;
  color: var(--ink-light); box-shadow: var(--shadow);
}

/* Map ripple */
.map-ripple {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  background: var(--primary); opacity: 0.8; pointer-events: none; z-index: 800;
  transform: translate(-50%, -50%);
  animation: rippleOut 1.2s ease-out forwards;
}
@keyframes rippleOut {
  0%   { width: 10px; height: 10px; opacity: 0.7; }
  100% { width: 80px; height: 80px; opacity: 0; }
}

/* ── Shared panel ── */
.panel {
  position: fixed; right: 0; top: 58px; bottom: 0; width: 380px;
  background: var(--white); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 1400;
  box-shadow: -4px 0 24px rgba(0,0,0,0.06);
  animation: slideIn .22s cubic-bezier(0.22,1,0.36,1);
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.panel-head {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0;
}
.panel-head h3 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 17px; font-weight: 700; color: var(--ink); }
.panel-head p { font-size: 12px; color: var(--ink-light); margin-top: 2px; }
.panel-close { background: none; border: none; cursor: pointer; color: var(--ink-light); font-size: 22px; line-height: 1; padding: 2px; border-radius: 6px; }
.panel-close:hover { background: var(--cream); color: var(--ink); }

/* ── Timeframe bar ── */
.tf-bar { display: flex; gap: 4px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
.tf-btn {
  background: var(--cream); border: 1px solid var(--border-med); color: var(--ink-light);
  padding: 4px 12px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
  cursor: pointer; border-radius: 100px; transition: all .15s;
}
.tf-btn:hover { border-color: var(--primary); color: var(--primary-dark); }
.tf-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

/* ── Node timeline ── */
.timeline-scroll { flex: 1; overflow-y: auto; padding: 0; }
.timeline-scroll::-webkit-scrollbar { width: 4px; }
.timeline-scroll::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 4px; }

.tl-empty { padding: 48px 24px; text-align: center; color: var(--ink-light); font-family: 'Inter', sans-serif; font-size: 13px; }

.tl-item {
  display: flex; gap: 14px; padding: 0 20px;
  cursor: pointer; transition: background .12s;
  animation: nodeIn .3s ease both;
}
.tl-item:hover { background: var(--cream); }
@keyframes nodeIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }

.tl-track { display: flex; flex-direction: column; align-items: center; padding-top: 16px; }
.tl-dot {
  width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--white); box-shadow: 0 0 0 1.5px currentColor;
  transition: transform .15s;
}
.tl-item:hover .tl-dot { transform: scale(1.25); }
.tl-line { flex: 1; width: 1.5px; background: var(--border-med); margin-top: 4px; min-height: 12px; }
.tl-item:last-child .tl-line { display: none; }

.tl-body { flex: 1; padding: 14px 0 14px; border-bottom: 1px solid var(--border); }
.tl-item:last-child .tl-body { border-bottom: none; }
.tl-time { font-size: 11px; color: var(--ink-light); margin-bottom: 5px; }
.tl-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.tl-tag { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 500; }

.tl-audio-wrap { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
.tl-audio-wrap.open { max-height: 60px; }
.tl-audio-wrap audio { width: 100%; height: 28px; margin-top: 6px; accent-color: #111; }

/* ── Record modal ── */
.overlay { position: fixed; inset: 0; background: rgba(252,252,248,0.85); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; animation: fadeIn .15s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--white); border-radius: 20px; padding: 32px 32px 28px;
  width: 420px; max-width: 95vw; position: relative;
  box-shadow: var(--shadow-lg); border: 1px solid var(--border);
  animation: popIn .2s cubic-bezier(0.22,1,0.36,1);
}
@keyframes popIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
.modal-close { position: absolute; top: 16px; right: 18px; background: var(--cream); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 18px; color: var(--ink-light); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: #f0e8e0; color: var(--ink); }
.modal h2 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 20px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.loc-note { font-size: 11px; color: var(--ink-light); margin-bottom: 20px; }

.rec-center { display: flex; flex-direction: column; align-items: center; gap: 18px; }
.rec-ring {
  width: 140px; height: 140px; border-radius: 50%;
  border: 2.5px solid #111; background: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; gap: 2px; user-select: none;
  transition: box-shadow .2s, transform .15s;
}
.rec-ring:hover { box-shadow: 0 0 0 10px rgba(0,0,0,0.06); transform: scale(1.02); }
.rec-ring.active { animation: recPulse 1.2s ease-in-out infinite; }
@keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,0,0,0.22); } 50% { box-shadow: 0 0 0 18px rgba(0,0,0,0); } }
.rec-icon { font-size: 40px; color: var(--primary); }
.rec-count { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 44px; font-weight: 700; color: var(--primary); line-height: 1; }
.rec-label { font-size: 10px; letter-spacing: 2px; color: var(--ink-light); font-weight: 500; }
.rec-hint { font-size: 12px; color: var(--ink-light); }

.wave-bars { display: flex; align-items: center; gap: 4px; height: 40px; }
.wave-bar { width: 4px; border-radius: 4px; background: var(--primary); animation: wA .7s ease-in-out infinite alternate; min-height: 4px; }
@keyframes wA { from { height: 5px; } to { height: 34px; } }

.rec-review { display: flex; flex-direction: column; gap: 14px; }
audio { width: 100%; height: 30px; accent-color: #111; }

.tag-row { display: flex; gap: 6px; }
.tag-row input {
  flex: 1; background: var(--cream); border: 1.5px solid var(--border-med);
  color: var(--ink); padding: 9px 13px; font-family: 'Inter', sans-serif; font-size: 13px;
  border-radius: 10px; outline: none;
}
.tag-row input:focus { border-color: var(--primary); }
.tag-row input::placeholder { color: var(--ink-light); }
.tag-row .btn-add { background: var(--primary); color: #fff; border: none; width: 38px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 10px; }

.tags-wrap { display: flex; flex-wrap: wrap; gap: 5px; min-height: 20px; }
.tag-chip { padding: 3px 10px; font-size: 11px; border-radius: 100px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
.tag-chip:hover { opacity: 0.65; }

.review-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.btn-primary { background: var(--primary); color: #fff; border: none; padding: 10px 24px; font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 100px; }
.btn-primary:hover { opacity: 0.9; }
.btn-ghost { background: var(--cream); color: var(--ink-light); border: 1px solid var(--border-med); padding: 10px 20px; font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 100px; }
.btn-ghost:hover { border-color: var(--ink-light); color: var(--ink); }

.spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 16px 0; font-size: 13px; color: var(--ink-light); }
.spinner { width: 30px; height: 30px; border: 2.5px solid var(--border-med); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
.spinner-sm { display: inline-block; width: 11px; height: 11px; border: 1.5px solid var(--border-med); border-top-color: var(--accent-teal); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Music panel ── */
.gen-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
.gen-body label { display: block; font-size: 11px; font-weight: 500; color: var(--ink-light); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
.gen-body p { font-size: 12px; color: var(--ink-light); line-height: 1.7; }
.gen-status { font-size: 12px; color: var(--ink-light); font-style: italic; min-height: 16px; }
.btn-generate { background: #111; color: #fff; border: none; width: 100%; padding: 13px; font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 12px; transition: opacity .15s, box-shadow .15s; box-shadow: none; }
.btn-generate:hover { background: #333; }
.btn-generate:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
.gen-result { border: 1px solid var(--border-med); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
.gen-result h4 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 18px; color: #111; }
.btn-dl { display: block; text-align: center; border: 1px solid var(--border-med); color: var(--ink-light); padding: 9px; text-decoration: none; font-size: 12px; border-radius: 8px; transition: all .15s; }
.btn-dl:hover { border-color: #111; color: #111; }

.panel-msg { padding: 48px 24px; text-align: center; color: var(--ink-light); font-family: 'Inter', sans-serif; font-size: 13px; }

/* ── Waveform skyline view ── */
.skyline-overlay {
  position: fixed; inset: 0; background: #fff; z-index: 2500;
  display: flex; flex-direction: column; animation: fadeIn .2s;
}
.sky-head {
  padding: 22px 30px 8px; display: flex; align-items: flex-start;
  justify-content: space-between; flex-shrink: 0;
}
.sky-head h3 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-size: 20px; font-weight: 700; color: #111; }
.sky-head p { font-size: 12px; color: var(--ink-light); margin-top: 3px; }
.sky-close { background: none; border: none; cursor: pointer; color: var(--ink-light); font-size: 26px; line-height: 1; padding: 2px 6px; }
.sky-close:hover { color: #111; }
.sky-canvas-wrap { flex: 1; position: relative; min-height: 0; }
.sky-canvas { width: 100%; height: 100%; display: block; cursor: default; }
.sky-tip {
  position: absolute; pointer-events: none; background: #111; color: #fff;
  font-size: 11px; padding: 5px 10px; border-radius: 8px; white-space: nowrap;
  transform: translate(-50%, -130%); opacity: 0; transition: opacity .12s;
}
.sky-status { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--ink-light); }
</style>
</head>
<body>


<div id="app">
  <header id="header">
    <div class="logo">
      <span class="logo-text">city sound<!-- white joint cutouts -->
        <span class="logo-dot" style="left:1.6px;  top:13px;"></span><!-- c left stroke -->
        <span class="logo-dot" style="left:21.2px; top:5px;"></span><!-- t stem top -->
        <span class="logo-dot" style="left:33.6px; top:13.6px;"></span><!-- y stroke junction -->
        <span class="logo-dot" style="left:52.4px; top:12.6px;"></span><!-- s spine center -->
        <span class="logo-dot" style="left:58.3px; top:13px;"></span><!-- o left -->
        <span class="logo-dot" style="left:68px;   top:13px;"></span><!-- o right -->
        <span class="logo-dot" style="left:76px;   top:18.4px;"></span><!-- u bottom center -->
        <span class="logo-dot" style="left:81.2px; top:7.4px;"></span><!-- u right stem top -->
        <span class="logo-dot" style="left:84.4px; top:8px;"></span><!-- n shoulder -->
        <span class="logo-dot" style="left:107px;  top:13px;"></span><!-- d stem right -->
      </span>
      <!-- single-line skyline icon: one continuous stroke, dips below baseline -->
      <svg class="logo-icon" viewBox="0 0 58 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="miter" stroke-linecap="square" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M0 19 H8 V9 H12 V26 H16 V13 H20 V16 H23 V2 H29 V25 H33 V10 H37 V28 H41 V12 H45 V19 H58"/>
      </svg>
    </div>
    <div class="header-actions">
      <button class="btn btn-tool" id="btn-gen" title="see the archive and generate a house track"><span class="tool-glyph">♪</span> generate</button>
      <div class="city-picker" id="city-picker">
        <button class="btn btn-city" id="btn-city">
          <span id="city-label">NYC</span>
          <span class="btn-city-arrow">▾</span>
        </button>
        <div class="city-dropdown" id="city-dropdown">
          <div class="city-opt active" data-city="NYC">
            New York City <span class="city-opt-check">✓</span>
          </div>
          <div class="city-divider"></div>
          <div class="city-opt" data-city="LA" style="opacity:0.4;pointer-events:none;">
            Los Angeles <span class="city-opt-tag">soon</span>
          </div>
          <div class="city-opt" data-city="CHI" style="opacity:0.4;pointer-events:none;">
            Chicago <span class="city-opt-tag">soon</span>
          </div>
          <div class="city-opt" data-city="LDN" style="opacity:0.4;pointer-events:none;">
            London <span class="city-opt-tag">soon</span>
          </div>
          <div class="city-opt" data-city="TKY" style="opacity:0.4;pointer-events:none;">
            Tokyo <span class="city-opt-tag">soon</span>
          </div>
        </div>
      </div>
      <button class="btn btn-rec" id="btn-rec">● record</button>
    </div>
  </header>
  <div id="map-wrap">
    <div id="map"></div>
    <!-- paper grain sits above tiles, below grid/controls -->
    <svg id="map-grain" style="position:absolute;inset:0;pointer-events:none;z-index:450;width:100%;height:100%;" aria-hidden="true">
      <defs>
        <filter id="grain-filter" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
          <feColorMatrix type="saturate" values="0"/>
        </filter>
      </defs>
      <rect width="100%" height="100%" filter="url(#grain-filter)" opacity="0.055"/>
    </svg>
    <div class="zoom-pill" id="zoom-pill">zoom 12</div>
  </div>
</div>
<div id="portal"></div>

<script>
'use strict';

const API = '';

/* ── Tag color system ── */
// monochrome tag styling to match the black & white identity
const TAG_STYLE = { bg:'#f2f2f2', fg:'#333333' };

function tagColor() {
  return TAG_STYLE;
}
function dotColor() {
  return '#111111';
}

/* ── Helpers ── */
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
function mount(node) { document.getElementById('portal').appendChild(node); return () => node.remove(); }
function fmtTime(ts) { return new Date(ts).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
function sinceDate(tf) {
  const d = new Date();
  if (tf==='1h')  d.setHours(d.getHours()-1);
  else if (tf==='24h') d.setDate(d.getDate()-1);
  else if (tf==='7d')  d.setDate(d.getDate()-7);
  else if (tf==='30d') d.setDate(d.getDate()-30);
  return d.toISOString();
}
function cellSize(zoom) {
  const s={10:.05,11:.025,12:.0125,13:.00625,14:.003125,15:.001562,16:.000781,17:.000390};
  return s[Math.min(17,Math.max(10,Math.round(zoom)))]??.0125;
}

let drawGeneration = 0;
let drawDebounce = null;

function scheduleDrawGrid() { clearTimeout(drawDebounce); drawDebounce = setTimeout(drawGrid, 120); }

async function drawGrid() {
  const gen = ++drawGeneration;
  const b = map.getBounds(), z = map.getZoom();
  document.getElementById('zoom-pill').textContent = `zoom ${Math.round(z)}`;

  let cells = [];
  try {
    const p = new URLSearchParams({ south:b.getSouth(),north:b.getNorth(),west:b.getWest(),east:b.getEast(),zoom:z });
    cells = await fetch(`${API}/api/grid?${p}`).then(r=>r.json());
  } catch(_) {}
  if (gen !== drawGeneration) return;

  if (gridLayer) { gridLayer.remove(); gridLayer = null; }

  const cellMap = {}, cs = cellSize(z);
  let maxCount = 0;
  for (const c of cells) { cellMap[`${c.row}_${c.col}`] = c.count; if (c.count > maxCount) maxCount = c.count; }

  const sr = Math.floor(b.getSouth()/cs), er = Math.ceil(b.getNorth()/cs);
  const sc = Math.floor(b.getWest()/cs),  ec = Math.ceil(b.getEast()/cs);
  const layer = L.layerGroup();

  /* ── 1. Dotted grid lines (all cells) ── */
  const lineOpt = { color:'#b9b9b9', weight:0.8, dashArray:'2 7', opacity:0.75, interactive:false };
  for (let row = sr; row <= er + 1; row++) {
    L.polyline([[row*cs, sc*cs], [row*cs, (ec+1)*cs]], lineOpt).addTo(layer);
  }
  for (let col = sc; col <= ec + 1; col++) {
    L.polyline([[sr*cs, col*cs], [(er+1)*cs, col*cs]], lineOpt).addTo(layer);
  }

  /* ── 2. Pencil-wash fill for occupied cells ── */
  for (let row = sr; row <= er; row++) {
    for (let col = sc; col <= ec; col++) {
      const count = cellMap[`${row}_${col}`] ?? 0;
      if (!count) continue;

      const ratio = count / Math.max(maxCount, 1);
      const fillOpacity = 0.18 + ratio * 0.22;
      const strokeOpacity = 0.55 + ratio * 0.3;
      const style = {
        fillColor: '#555555', fillOpacity,
        color: '#222222', weight: 1.2,
        dashArray: '3 5', opacity: strokeOpacity,
        interactive: true,
      };
      const bounds = { south:row*cs, north:(row+1)*cs, west:col*cs, east:(col+1)*cs };
      const rect = L.rectangle(
        [[bounds.south, bounds.west],[bounds.north, bounds.east]], style
      );
      const hoverStyle = { ...style, fillOpacity: Math.min(fillOpacity + 0.15, 0.55), weight:2, dashArray:'3 4', opacity:1 };
      rect.on('mouseover', () => { rect.setStyle(hoverStyle); map.getContainer().style.cursor = 'pointer'; });
      rect.on('mouseout',  () => { rect.setStyle(style);      map.getContainer().style.cursor = ''; });
      rect.on('click', () => { showHighlight(bounds); openTimeline({ row, col, cs, count, bounds }); });
      layer.addLayer(rect);
    }
  }

  layer.addTo(map);
  gridLayer = layer;
}

function showHighlight(bounds) {
  if (activeHighlight) { activeHighlight.remove(); activeHighlight = null; }
  activeHighlight = L.rectangle(
    [[bounds.south, bounds.west],[bounds.north, bounds.east]],
    { color:'#111111', weight:2, fill:false, dashArray:'5 4', opacity:0.9 }
  ).addTo(map);
}

/* ── Auto-tagging: YAMNet (AudioSet, 521 classes) in the browser via tf.js.
   Lazy-loaded on first recording; suggestions are editable like any tag. ── */
let yamnetPromise = null;
function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = () => rej(new Error('script load failed'));
    document.head.appendChild(s);
  });
}
async function loadYamnet() {
  if (!yamnetPromise) yamnetPromise = (async () => {
    if (!window.tf) await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js');
    const model = await tf.loadGraphModel('https://tfhub.dev/google/tfjs-model/yamnet/tfjs/1', { fromTFHub: true });
    const csv = await fetch('https://raw.githubusercontent.com/tensorflow/models/master/research/audioset/yamnet/yamnet_class_map.csv').then(r => r.text());
    const names = csv.trim().split('\n').slice(1).map(l => l.split(',').slice(2).join(',').replace(/^"|"$/g, '').trim());
    return { model, names };
  })().catch(e => { yamnetPromise = null; throw e; });
  return yamnetPromise;
}

// AudioSet display names → our tag vocabulary
const AUTOTAG_RULES = [
  [/pigeon|dove/i, 'pigeon'],
  [/bird|chirp|tweet|crow|caw|owl/i, 'birds'],
  [/dog|bark|bow-wow|growl|howl/i, 'dog'],
  [/siren|ambulance|police car|fire engine/i, 'siren'],
  [/subway|railroad|rail|train/i, 'subway'],
  [/rain|drizzle/i, 'rain'],
  [/stream|water|fountain|waves/i, 'water'],
  [/crowd|hubbub|chatter|babble/i, 'crowd'],
  [/child|children|kid/i, 'children'],
  [/laugh/i, 'laugh'],
  [/speech|conversation|narration|shout|yell/i, 'voices'],
  [/music|singing|guitar|drum|jazz|piano|violin|instrument|choir/i, 'music'],
  [/jackhammer|drill|hammer|sawing|power tool|construction/i, 'construction'],
  [/skateboard/i, 'skateboard'],
  [/church bell|bell|chime|ding/i, 'chimes'],
  [/car|vehicle|traffic|truck|bus|engine|motorcycle|horn|honk/i, 'traffic'],
  [/aircraft|airplane|helicopter/i, 'aircraft'],
  [/wind/i, 'wind'],
  [/thunder/i, 'thunder'],
  [/footsteps|walking/i, 'footsteps'],
  [/cat|meow/i, 'cat'],
  [/insect|cricket|cicada/i, 'insects'],
];

async function suggestTags(blob) {
  const { model, names } = await loadYamnet();
  const ab = await blob.arrayBuffer();
  const AC = new (window.AudioContext || window.webkitAudioContext)();
  const buf = await AC.decodeAudioData(ab);
  await AC.close();
  // YAMNet expects 16 kHz mono
  const off = new OfflineAudioContext(1, Math.ceil(buf.duration * 16000), 16000);
  const src = off.createBufferSource(); src.buffer = buf;
  src.connect(off.destination); src.start();
  const r16 = await off.startRendering();
  const wave = r16.getChannelData(0);

  const pooled = tf.tidy(() => {
    const out = model.predict(tf.tensor1d(wave)); // [scores, embeddings, spectrogram]
    const s = Array.isArray(out) ? out[0] : out;
    // blend mean and max over frames: mean rewards sustained sounds,
    // max catches short events (a chirp, a bark) that dilute in the average
    return s.mean(0).mul(0.5).add(s.max(0).mul(0.5));
  });
  const vals = await pooled.data();
  pooled.dispose();

  const order = [...vals.keys()].sort((a, b) => vals[b] - vals[a]).slice(0, 15);
  const found = [];
  for (const i of order) {
    if (vals[i] < 0.1) break;                  // confidence floor
    const name = names[i] || '';
    if (/silence|noise|static|hiss|spray|steam|buzz|sine wave|inside|outside|sound effect|echo|reverberation/i.test(name)) continue;
    for (const [re, tag] of AUTOTAG_RULES) {
      if (re.test(name) && !found.includes(tag)) { found.push(tag); break; }
    }
    if (found.length >= 3) break;
  }
  return found;
}

    }catch{alert('Cannot reach the server on port 8000.');phase='review';renderReview();}
  }

  renderIdle();
}

/* ── Pitch detection & scale helpers ── */
const MUSIC_SCALES = {
  major:      { intervals:[0,2,4,5,7,9,11], label:'major' },
  minor:      { intervals:[0,2,3,5,7,8,10], label:'minor' },
  dorian:     { intervals:[0,2,3,5,7,9,10], label:'dorian' },
  phrygian:   { intervals:[0,1,3,5,7,8,10], label:'phrygian' },
  lydian:     { intervals:[0,2,4,6,7,9,11], label:'lydian' },
  pentatonic: { intervals:[0,2,4,7,9],      label:'pentatonic' },
};
const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

function getScaleForTags(tags) {
  const t = (tags||[]).join(' ').toLowerCase();
  if (/bird|nature|park|tree|wind|forest/.test(t))  return { root:67, ...MUSIC_SCALES.major,      display:'G major' };
  if (/music|sing|drum|guitar|jazz|band/.test(t))   return { root:69, ...MUSIC_SCALES.dorian,     display:'A dorian' };
  if (/child|kids|play|laugh/.test(t))              return { root:60, ...MUSIC_SCALES.pentatonic, display:'C pentatonic' };
  if (/mystery|chime|strange|eerie/.test(t))        return { root:59, ...MUSIC_SCALES.phrygian,   display:'B phrygian' };
  if (/water|rain|river|ocean|fountain/.test(t))    return { root:64, ...MUSIC_SCALES.lydian,     display:'E lydian' };
  if (/traffic|car|truck|subway|bus|horn/.test(t))  return { root:62, ...MUSIC_SCALES.minor,      display:'D minor' };
  if (/voice|talk|people|crowd|shout/.test(t))      return { root:65, ...MUSIC_SCALES.dorian,     display:'F dorian' };
  return { root:60, ...MUSIC_SCALES.major, display:'C major' };
}

function detectPitch(samples, sr) {
  const N = samples.length;
  const minTau = Math.floor(sr / 1200);
  const maxTau = Math.min(Math.floor(sr / 60), Math.floor(N * 0.48));
  let bestR = 0, bestTau = -1;
  for (let tau = minTau; tau <= maxTau; tau++) {
    let num = 0, den = 0;
    const len = N - tau;
    for (let i = 0; i < len; i++) {
      num += samples[i] * samples[i + tau];
      den += samples[i] * samples[i] + samples[i + tau] * samples[i + tau];
    }
    const r = den > 1e-10 ? 2 * num / den : 0;
    if (r > bestR) { bestR = r; bestTau = tau; }
  }
  return bestR > 0.3 && bestTau > 0 ? sr / bestTau : null;
}

function freqToMidi(freq) { return Math.round(12 * Math.log2(freq / 440) + 69); }

function quantizeToScale(midi, root, intervals) {
  while (midi < 48) midi += 12;
  while (midi > 84) midi -= 12;
  const semis = ((midi - root) % 12 + 12) % 12;
  let nearest = intervals[0], minD = 12;
  for (const iv of intervals) {
    const d = Math.min(Math.abs(semis - iv), 12 - Math.abs(semis - iv));
    if (d < minD) { minD = d; nearest = iv; }
  }
  const base = ((root % 12) + 12) % 12;
  const oct = Math.floor((midi - base) / 12);
  return base + oct * 12 + nearest;
}

function midiToName(midi) {
  return NOTE_NAMES[((midi % 12) + 12) % 12] + (Math.floor(midi / 12) - 1);
}

let studioAnchor = { lat: 40.758, lng: -73.9855 }; // re-set from the map on open, movable via the inset
const studioCache = new Map(); // filename → { buf, onsets, freq }

function distKm(lat, lng) {
  const R = 6371, toR = Math.PI / 180;
  const dLat = (lat - studioAnchor.lat) * toR, dLng = (lng - studioAnchor.lng) * toR;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat*toR) * Math.cos(studioAnchor.lat*toR) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function promptFor(rec) {
  const t = (rec.tags || []).join(' ');
  const hr = new Date(rec.timestamp).getHours();
  if (/birds|pigeon/.test(t)) return 'the birds start before the traffic does — when did you last hear the first one?';
  if (/rain|thunder/.test(t)) return 'rain sounds different on every street — where does it land near you?';
  if (/children|play/.test(t)) return 'a playground is the loudest kind of joy — walk past one without headphones.';
  if (/siren/.test(t))        return 'a siren passes through every life in this city — notice where yours crosses it.';
  if (/subway/.test(t))       return 'the city hums underneath — next platform, listen before the train arrives.';
  if (/bells|chimes/.test(t)) return 'somewhere a bell still marks the hour — can you hear one from your block?';
  if (/dog|cat/.test(t))      return 'every block has a voice that isn\'t human — who speaks on yours?';
  if (/water|fountain/.test(t)) return 'find the nearest fountain and stay for one full minute.';
  if (/crickets|insects/.test(t)) return 'even here, the night still sings — step out after dark and count the layers.';
  if (/music|organ|singing/.test(t)) return 'someone is always playing somewhere — follow the next music you hear.';
  if (hr < 6)  return `this was ${hr}am — the city before dawn is a different animal. hear it once.`;
  if (hr < 12) return 'morning has a sound signature — step outside and learn your block\'s.';
  if (hr < 18) return 'the afternoon din hides small sounds — stop for thirty seconds and count them.';
  return 'evening softens the city — take the long way home and listen.';
}

function analyzeBuffer(buf) {
  const raw = buf.getChannelData(0), sr = buf.sampleRate;
  const win = Math.floor(sr * 0.3), hop = Math.floor(sr * 0.1);
  const cands = [];
  for (let i = 0; i < raw.length - win; i += hop) {
    let e = 0; for (let j = 0; j < win; j += 8) e += raw[i + j] ** 2;
    cands.push({ off: i, e });
  }
  cands.sort((a, b) => b.e - a.e);
  const onsets = [];
  for (const c of cands) {
    if (onsets.every(o => Math.abs(o - c.off) > sr * 0.5)) onsets.push(c.off);
    if (onsets.length >= 4) break;
  }
  const top = cands[0] ? cands[0].off : 0;
  const freq = detectPitch(raw.slice(top, top + 4096), sr);
  return { onsets: onsets.length ? onsets : [0], freq };
}

/* the house engine — takes analyzed clips [{rec,buf,onsets,freq}], returns a wav url */
// each genre re-tunes the same primitives (kick/hat/clap/bass/atmosphere/chops)
// bpm ranges are wide on purpose: the actual tempo is estimated from the audio
const GENRES = {
  house:   { label: 'house',   bpm: [116, 128, 1], bars: 16, kick: 'four',    hat: 'offbeat', clap: true,  bass: 'offbeat', atmoLP: [500, 1400], duck: 0.14, reverb: 0,    crackle: false },
  techno:  { label: 'techno',  bpm: [126, 140, 1], bars: 16, kick: 'four',    hat: 'driving', clap: false, bass: 'rolling', atmoLP: [300, 650],  duck: 0.10, reverb: 0.1,  crackle: false, dark: true },
  lofi:    { label: 'lo-fi',   bpm: [68, 92, 1],   bars: 12, kick: 'boombap', hat: 'lazy',    clap: 'rim', bass: 'root',    atmoLP: [700, 1300], duck: 0.3,  reverb: 0.22, crackle: true,  swingBoost: 0.16 },
  ambient: { label: 'ambient', bpm: [54, 76, 1],   bars: 8,  kick: 'none',    hat: 'none',    clap: false, bass: 'drone',   atmoLP: [350, 800],  duck: 0.6,  reverb: 0.42, crackle: false, float: true },
};

// energy weight per tag → drives density, brightness, swing of the arrangement
const TAG_ENERGY = {
  siren: 1, traffic: 0.9, subway: 0.85, construction: 1, machinery: 0.95, crowd: 0.72,
  market: 0.7, skateboard: 0.75, helicopter: 0.9, aircraft: 0.85, thunder: 0.8, dog: 0.6,
  music: 0.62, singing: 0.55, live: 0.7, drums: 0.85, voices: 0.5, children: 0.6, laugh: 0.6, busy: 0.75,
  birds: 0.22, pigeon: 0.28, nature: 0.2, park: 0.24, water: 0.2, fountain: 0.22, rain: 0.32,
  chimes: 0.22, bells: 0.3, wind: 0.2, crickets: 0.15, insects: 0.2, cat: 0.32, organ: 0.35, night: 0.2, morning: 0.3,
};

function tagMood(clips) {
  let e = 0, cnt = 0;
  for (const c of clips) for (const t of (c.rec.tags || [])) {
    const w = TAG_ENERGY[String(t).toLowerCase()];
    if (w != null) { e += w; cnt++; }
  }
  const energy = cnt ? e / cnt : 0.5;
  const scale = getScaleForTags(clips.flatMap(c => c.rec.tags || []));
  return { energy, scale, label: energy > 0.64 ? 'restless' : energy < 0.4 ? 'calm' : 'steady' };
}

// estimate tempo from an onset envelope, folded into [lo,hi]
function estimateBPM(buf, lo, hi) {
  const sr = buf.sampleRate, raw = buf.getChannelData(0);
  const hop = Math.max(1, Math.floor(sr / 100)), n = Math.floor(raw.length / hop);
  if (n < 40) return null;
  const env = new Float32Array(n);
  for (let i = 0; i < n; i++) { let s = 0; for (let j = 0; j < hop; j += 4) { const x = raw[i * hop + j]; s += x * x; } env[i] = Math.sqrt(s); }
  const on = new Float32Array(n);
  for (let i = 1; i < n; i++) { const d = env[i] - env[i - 1]; on[i] = d > 0 ? d : 0; }
  const fps = 100, lagLo = Math.floor(fps * 60 / (hi * 2)), lagHi = Math.ceil(fps * 60 / (lo / 2));
  let bestLag = -1, best = 0;
  for (let lag = lagLo; lag <= lagHi; lag++) {
    let s = 0; for (let i = lag; i < n; i++) s += on[i] * on[i - lag];
    if (s > best) { best = s; bestLag = lag; }
  }
  if (bestLag <= 0) return null;
  let bpm = fps * 60 / bestLag;
  while (bpm < lo) bpm *= 2; while (bpm > hi) bpm /= 2;
  return (bpm >= lo && bpm <= hi) ? bpm : null;
}

async function generateTrack(clips, seedExtra, genreKey, setStatus) {
  const cfg = GENRES[genreKey] || GENRES.house;
  let seed = 2166136261;
  const mix = str => { for (let i = 0; i < str.length; i++) { seed ^= str.charCodeAt(i); seed = Math.imul(seed, 16777619) >>> 0; } };
  clips.forEach(c => mix(c.rec.id || c.rec.filename));
  mix(String(seedExtra)); mix(genreKey); mix(String(Date.now() >>> 10));
  const rand = () => { seed = (Math.imul(seed, 1103515245) + 12345) >>> 0; return (seed >>> 8) / 0x1000000; };
  const pick = arr => arr[Math.floor(rand() * arr.length)];

  const mood = tagMood(clips);
  const [bMin, bMax] = cfg.bpm;
  // tempo comes from the actual audio: estimate from a seeded pick among the longer clips
  const tempoPool = clips.slice().sort((a, b) => b.buf.duration - a.buf.duration).slice(0, Math.max(1, Math.ceil(clips.length / 2)));
  let BPM = estimateBPM(pick(tempoPool).buf, bMin, bMax);
  if (BPM == null) BPM = bMin + rand() * (bMax - bMin);
  // blend estimate with a mood bias, then add seeded jitter so it doesn't cluster
  BPM = BPM * 0.6 + (bMin + mood.energy * (bMax - bMin)) * 0.4 + (rand() - 0.5) * (bMax - bMin) * 0.4;
  BPM = Math.round(Math.max(bMin, Math.min(bMax, BPM)));
  const BEAT = 60 / BPM, BARS = cfg.bars, TOTAL = BARS * 4 * BEAT + 2;
  const SWING = rand() * 0.08 + (cfg.swingBoost || 0) + (mood.energy < 0.4 ? 0.04 : 0);
  const SIXTEENTHS = rand() < (0.25 + mood.energy * 0.55);
  const ATMO_LP = cfg.atmoLP[0] + rand() * (cfg.atmoLP[1] - cfg.atmoLP[0]);
  const DUCK = cfg.duck;
  const CHOP_DENSITY = Math.max(0, Math.min(1, mood.energy * 0.7 + rand() * 0.5 - 0.1));
  const kickStart = cfg.float ? 0 : pick([1, 2, 2, 3]); // vary how the track opens
  setStatus(`sequencing ${cfg.label} · ${BPM} bpm · ${mood.label}…`);

  const SR = 44100;
  const off = new OfflineAudioContext(2, Math.ceil(SR * TOTAL), SR);
  const t0 = 0.05;
  const beatAt = (bar, beat) => t0 + (bar * 4 + beat) * BEAT;

  const comp = off.createDynamicsCompressor();
  comp.threshold.value = -14; comp.ratio.value = 4; comp.attack.value = 0.004; comp.release.value = 0.18;
  const master = off.createGain();
  master.gain.setValueAtTime(0, 0);
  master.gain.linearRampToValueAtTime(0.9, 1.2);
  master.gain.setValueAtTime(0.9, TOTAL - 2.2);
  master.gain.linearRampToValueAtTime(0, TOTAL - 0.1);
  comp.connect(master); master.connect(off.destination);

  // optional reverb send (lo-fi / ambient / techno tail)
  let reverb = null;
  if (cfg.reverb > 0) {
    reverb = off.createConvolver();
    const len = Math.ceil(SR * 2.6), ir = off.createBuffer(2, len, SR);
    for (let ch = 0; ch < 2; ch++) { const d = ir.getChannelData(ch); for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3); }
    reverb.buffer = ir;
    const rg = off.createGain(); rg.gain.value = cfg.reverb;
    reverb.connect(rg); rg.connect(comp);
  }
  const toReverb = node => { if (reverb) node.connect(reverb); };

  // optional master filter-sweep intro (classic build) for extra arrangement variety
  let outNode = comp;
  const filterIntro = !cfg.float && rand() < 0.5;
  if (filterIntro) {
    const mf = off.createBiquadFilter(); mf.type = 'lowpass'; mf.Q.value = 1;
    const sweepBars = pick([2, 4, 4]);
    mf.frequency.setValueAtTime(320, t0);
    mf.frequency.exponentialRampToValueAtTime(18000, t0 + sweepBars * 4 * BEAT);
    mf.connect(comp); outNode = mf;
  }

  const hasKick = b => b >= kickStart && b < BARS - 1, hasBass = b => b >= kickStart + 2 && b < BARS - 2, hasChops = b => b >= (cfg.float ? 0 : Math.max(1, kickStart));
  const hasClap = b => b >= kickStart + 2 && b < BARS - 2;

  const drumBus = off.createGain(); drumBus.gain.value = 1; drumBus.connect(outNode);
  function kick(t, soft) {
    const o = off.createOscillator(), g = off.createGain();
    o.frequency.setValueAtTime(soft ? 120 : 150, t);
    o.frequency.exponentialRampToValueAtTime(soft ? 50 : 45, t + (soft ? 0.16 : 0.12));
    g.gain.setValueAtTime(soft ? 0.85 : 1.0, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + (soft ? 0.34 : 0.28));
    o.connect(g); g.connect(drumBus); o.start(t); o.stop(t + 0.36);
    if (!soft) {
      const n = off.createBufferSource(), nb = off.createBuffer(1, 220, SR);
      const d = nb.getChannelData(0); for (let i = 0; i < 220; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / 220);
      n.buffer = nb;
      const ng = off.createGain(); ng.gain.value = 0.25;
      n.connect(ng); ng.connect(drumBus); n.start(t);
    }
  }
  const noiseBuf = off.createBuffer(1, SR, SR);
  { const d = noiseBuf.getChannelData(0); for (let i = 0; i < SR; i++) d[i] = Math.random() * 2 - 1; }
  function hat(t, open, soft) {
    const s = off.createBufferSource(); s.buffer = noiseBuf;
    const hp = off.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 8200;
    const g = off.createGain();
    const dur = open ? 0.14 : 0.045;
    g.gain.setValueAtTime((open ? 0.32 : 0.25) * (soft ? 0.55 : 1), t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    s.connect(hp); hp.connect(g); g.connect(drumBus);
    s.start(t, rand() * 0.4); s.stop(t + dur + 0.02);
  }
  function clap(t) {
    for (const dt of [0, 0.012, 0.026]) {
      const s = off.createBufferSource(); s.buffer = noiseBuf;
      const bp = off.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 1.1;
      const g = off.createGain();
      g.gain.setValueAtTime(dt === 0.026 ? 0.5 : 0.28, t + dt);
      g.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.12);
      s.connect(bp); bp.connect(g); g.connect(drumBus); toReverb(g);
      s.start(t + dt, rand() * 0.4); s.stop(t + dt + 0.15);
    }
  }
  function rim(t) { // soft lo-fi backbeat
    const s = off.createBufferSource(); s.buffer = noiseBuf;
    const bp = off.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2400; bp.Q.value = 2.5;
    const g = off.createGain();
    g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    s.connect(bp); bp.connect(g); g.connect(drumBus); toReverb(g);
    s.start(t, rand() * 0.4); s.stop(t + 0.08);
  }
  const openHatEvery = mood.energy > 0.64 ? pick([2, 2, 4]) : pick([4, 8, 8]);
  if (!cfg.float && cfg.kick !== 'none') {
    for (let bar = 0; bar < BARS; bar++) {
      for (let b = 0; b < 4; b++) {
        const t = beatAt(bar, b);
        // kick
        if (hasKick(bar)) {
          if (cfg.kick === 'four') kick(t);
          else if (cfg.kick === 'boombap' && (b === 0 || b === 2)) kick(t + (b === 2 ? BEAT * SWING : 0), true);
        }
        // hats
        if (cfg.hat === 'offbeat') hat(t + BEAT * (0.5 + SWING), false);
        else if (cfg.hat === 'driving') { hat(t, false, true); hat(t + BEAT * 0.5, false); }
        else if (cfg.hat === 'lazy' && (b === 1 || b === 3)) hat(t + BEAT * (0.5 + SWING), false, true);
        if (SIXTEENTHS && cfg.hat === 'offbeat' && bar >= 6 && bar < BARS - 2 && b % 2 === 1) hat(t + BEAT * 0.25, false);
        // backbeat
        if (cfg.clap === true && hasClap(bar) && (b === 1 || b === 3)) clap(t);
        if (cfg.clap === 'rim' && (b === 1 || b === 3)) rim(t + BEAT * SWING);
        if (cfg.hat === 'offbeat' && bar >= 4 && bar < BARS - 2 && b === 3 && bar % openHatEvery === openHatEvery - 1) hat(t + BEAT * (0.5 + SWING), true);
      }
    }
  }

  const pitched = clips.find(c => c.freq && c.freq > 60 && c.freq < 2000);
  let rootMidi = pitched ? freqToMidi(pitched.freq) : 45;
  while (rootMidi > 45) rootMidi -= 12; while (rootMidi < 33) rootMidi += 12;
  const bassBus = off.createGain(); bassBus.gain.value = 0.55; bassBus.connect(outNode);
  // harmony from the clips' tags: build a 2-bar bass pattern from the tag-derived scale,
  // so birds→major, traffic→minor, mystery→phrygian each sound harmonically different
  const sc = mood.scale.intervals;
  const bassPattern = (() => {
    const p = [];
    for (let i = 0; i < 8; i++) {
      if (i === 0 || i === 4) p.push(0);           // root on the strong beats
      else if (rand() < 0.45) p.push(0);
      else p.push(sc[Math.floor(rand() * sc.length)] + (rand() < 0.2 ? 12 : 0));
    }
    return p;
  })();
  function bassNote(t, midi, dur, wave, sweep) {
    const o = off.createOscillator(); o.type = wave || 'sawtooth';
    o.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);
    const lp = off.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = sweep ? 6 : 1;
    if (sweep) { lp.frequency.setValueAtTime(cfg.dark ? 600 : 900, t); lp.frequency.exponentialRampToValueAtTime(220, t + dur); }
    else lp.frequency.value = cfg.dark ? 500 : 800;
    const g = off.createGain();
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.5, t + 0.012);
    g.gain.setValueAtTime(0.5, t + dur - 0.04); g.gain.linearRampToValueAtTime(0, t + dur);
    o.connect(lp); lp.connect(g); g.connect(bassBus);
    o.start(t); o.stop(t + dur + 0.02);
  }
  if (cfg.bass === 'drone') {
    for (const iv of [0, 7, 12]) {
      const o = off.createOscillator(); o.type = 'sine';
      o.frequency.value = 440 * Math.pow(2, (rootMidi - 12 + iv - 69) / 12);
      const g = off.createGain();
      g.gain.setValueAtTime(0, t0); g.gain.linearRampToValueAtTime(0.16, t0 + 3);
      g.gain.setValueAtTime(0.16, TOTAL - 4); g.gain.linearRampToValueAtTime(0, TOTAL - 1);
      o.connect(g); g.connect(outNode); toReverb(g); o.start(t0); o.stop(TOTAL);
    }
  } else {
    for (let bar = 0; bar < BARS; bar++) {
      if (!hasBass(bar)) continue;
      for (let b = 0; b < 4; b++) {
        if (cfg.bass === 'offbeat') bassNote(beatAt(bar, b) + BEAT * (0.5 + SWING), rootMidi + bassPattern[(bar % 2) * 4 + b], BEAT * 0.42, 'sawtooth', true);
        else if (cfg.bass === 'rolling') { bassNote(beatAt(bar, b) + BEAT * 0.5, rootMidi, BEAT * 0.24, 'sawtooth', false); bassNote(beatAt(bar, b) + BEAT * 0.75, rootMidi, BEAT * 0.22, 'sawtooth', false); }
        else if (cfg.bass === 'root' && (b === 0 || b === 2)) bassNote(beatAt(bar, b) + BEAT * (b === 2 ? 0.5 + SWING : 0), rootMidi + bassPattern[(bar % 2) * 4 + b] % 12, BEAT * 0.7, 'triangle', false);
      }
    }
  }

  // vinyl crackle bed for lo-fi
  if (cfg.crackle) {
    const s = off.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
    const hp = off.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 3000;
    const g = off.createGain(); g.gain.value = 0.03;
    s.connect(hp); hp.connect(g); g.connect(outNode); s.start(t0);
  }

  const lngs = clips.map(c => c.rec.lng);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs), lngSpan = maxLng - minLng || 1;
  const panOf = c => Math.max(-0.85, Math.min(0.85, ((c.rec.lng - minLng) / lngSpan) * 2 - 1));
  const longIdxs = clips.map((c, i) => i).filter(i => clips[i].buf.duration >= 5);
  const atmoIdx = longIdxs.length ? pick(longIdxs) : clips.reduce((mi, c, i) => c.buf.duration > clips[mi].buf.duration ? i : mi, 0);
  {
    const c = clips[atmoIdx];
    const s = off.createBufferSource(); s.buffer = c.buf; s.loop = true;
    const lp = off.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = ATMO_LP;
    const duck = off.createGain();
    if (cfg.kick === 'none') { duck.gain.value = 0.32; }
    else for (let bar = 0; bar < BARS; bar++) for (let b = 0; b < 4; b++) {
      const t = beatAt(bar, b);
      duck.gain.setValueAtTime(hasKick(bar) ? DUCK : 0.3, t);
      duck.gain.linearRampToValueAtTime(0.34, t + BEAT * 0.72);
    }
    const g = off.createGain(); g.gain.value = 1;
    s.connect(lp); lp.connect(duck); duck.connect(g); g.connect(outNode); toReverb(g);
    s.start(t0);
  }

  const chopBus = off.createGain(); chopBus.gain.value = 0.9; chopBus.connect(outNode);
  const chopClips = clips.filter((_, i) => i !== atmoIdx)
    .map(c => ({ c, k: rand() })).sort((a, b) => a.k - b.k).map(x => x.c);
  function playChop(clip, t, dur, wet) {
    const onset = clip.onsets[Math.floor(rand() * clip.onsets.length)];
    const s = off.createBufferSource(); s.buffer = clip.buf;
    const pan = off.createStereoPanner(); pan.pan.value = panOf(clip);
    const g = off.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.85, t + Math.min(0.03, dur * 0.15));
    g.gain.setValueAtTime(0.85, t + dur - 0.05);
    g.gain.linearRampToValueAtTime(0, t + dur);
    s.connect(g); g.connect(pan); pan.connect(chopBus); if (wet) toReverb(pan);
    s.start(t, onset / clip.buf.sampleRate, dur + 0.05);
  }
  if (cfg.float) {
    // ambient: each clip drifts in a few times, long and reverberant, no grid
    chopClips.forEach((clip, i) => {
      const hits = 1 + Math.floor(rand() * 2);
      for (let h = 0; h < hits; h++) {
        const t = t0 + rand() * (TOTAL - 5);
        playChop(clip, t, 2 + rand() * 2.5, true);
      }
    });
  } else {
    const patternPool = [
      [1, 2.5], [0.5, 2, 3.5], [1.5, 3], [0.75, 2.25, 3.5],
      [2], [0.5, 1.5, 2.5, 3.5], [1, 1.75, 3], [0.25, 2, 2.75],
    ];
    const patterns = [];
    for (let k = 0; k < 4; k++) {
      const p = pick(patternPool);
      patterns.push(CHOP_DENSITY < 0.35 ? p.slice(0, Math.max(1, p.length - 1)) : p);
    }
    for (let bar = 0; bar < BARS; bar++) {
      if (!hasChops(bar) || !chopClips.length) continue;
      const clip = chopClips[bar % chopClips.length];
      const pat = patterns[bar % patterns.length];
      for (const stepBeat of pat) {
        const t = beatAt(bar, stepBeat + (stepBeat % 1 !== 0 ? SWING : 0));
        const dur = BEAT * (rand() < 0.3 ? 0.9 : 0.45);
        playChop(clip, t, dur, cfg.reverb > 0.15);
      }
    }
  }

  setStatus('rendering…');
  const rendered = await off.startRendering();
  const wav = encodeWav(rendered);
  return { url: URL.createObjectURL(new Blob([wav], { type: 'audio/wav' })), BPM, BARS, genre: cfg.label };
}

async function openStudio() {
  if (studioClose) { studioClose(); return; }

  const overlay = el('div', { class: 'skyline-overlay' });
  const tfBar = el('div', { class: 'tf-bar', style: 'border:none;padding:8px 0 0;' });
  const head = el('div', { class: 'sky-head' },
    el('div', {},
      el('h3', {}, 'generate'),
      el('p', {}, 'angle = hour it was captured · rings = distance from your point (move it on the little map) · click a ring to select a band, a burst to listen'),
      tfBar),
    el('button', { class: 'sky-close', onclick: () => studioClose && studioClose() }, '×')
  );
  const wrap = el('div', { class: 'sky-canvas-wrap' });
  const canvas = el('canvas', { class: 'sky-canvas' });
  const tip = el('div', { class: 'sky-tip' });
  const status = el('div', { class: 'sky-status' }, 'decoding the city…');
  const insetWrap = el('div', { style: 'position:absolute;left:22px;bottom:18px;width:200px;z-index:5;' },
    el('div', { style: 'font-size:9px;letter-spacing:1px;color:var(--ink-light);text-transform:uppercase;margin-bottom:4px;' }, 'your point — click to move it'),
    el('div', { id: 'studio-inset', style: 'width:200px;height:150px;border:1.5px solid #111;border-radius:10px;overflow:hidden;' }));
  wrap.append(canvas, tip, status, insetWrap);

  const strip = el('canvas', { style: 'width:100%;height:120px;display:block;flex-shrink:0;' });
  const caption = el('div', { style: 'text-align:center;font-size:12px;color:var(--ink-light);font-style:italic;min-height:18px;padding:0 30px;flex-shrink:0;' });
  const selLabel = el('span', { style: 'font-size:11px;color:var(--ink-light);letter-spacing:1px;text-transform:uppercase;' });
  let genre = 'house';
  const genreBar = el('div', { class: 'tf-bar', style: 'border:none;padding:0;gap:5px;' });
  for (const [k, g] of Object.entries(GENRES)) {
    genreBar.appendChild(el('button', {
      class: `tf-btn${k === 'house' ? ' active' : ''}`, onclick(e) {
        genreBar.querySelectorAll('.tf-btn').forEach(x => x.classList.remove('active'));
        e.currentTarget.classList.add('active'); genre = k;
      }
    }, g.label));
  }
  const genBtn = el('button', { class: 'btn-generate', style: 'width:auto;padding:10px 26px;border-radius:100px;', onclick: doGenerate }, '▶ generate');
  const result = el('span', { style: 'display:flex;align-items:center;gap:10px;' });
  const controls = el('div', { style: 'display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 30px 18px;flex-wrap:wrap;flex-shrink:0;' }, selLabel, genreBar, genBtn, result);
  overlay.append(head, wrap, strip, caption, controls);
  document.body.appendChild(overlay);

  // anchor starts wherever the main map is looking
  const c0 = map.getCenter();
  studioAnchor = { lat: c0.lat, lng: c0.lng };
  const inset = L.map('studio-inset', { zoomControl: false, attributionControl: false })
    .setView([studioAnchor.lat, studioAnchor.lng], 10);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(inset);
  const anchorDot = L.circleMarker([studioAnchor.lat, studioAnchor.lng],
    { radius: 6, color: '#111', weight: 2, fillColor: '#fff', fillOpacity: 1 }).addTo(inset);
  inset.on('click', e => {
    studioAnchor = { lat: e.latlng.lat, lng: e.latlng.lng };
    anchorDot.setLatLng(e.latlng);
    updateSelLabel(); redraw();
  });
  setTimeout(() => inset.invalidateSize(), 60);

  let clips = [], player = null, raf = null, playingIdx = -1;
  let selBand = null;          // [loKm, hiKm) or null = whole city
  let stripSegs = [], playingStrip = -1;
  let currentTf = 'all', genCount = 0;
  let nodes = [], geo = null;

  for (const [v, l] of [['1h', 'Last hour'], ['24h', 'Last 24h'], ['7d', '7 days'], ['30d', '30 days'], ['all', 'All time']]) {
    tfBar.appendChild(el('button', {
      class: `tf-btn${v === 'all' ? ' active' : ''}`, onclick(e) {
        tfBar.querySelectorAll('.tf-btn').forEach(x => x.classList.remove('active'));
        e.currentTarget.classList.add('active');
        currentTf = v; selBand = null; load();
      }
    }, l));
  }

  studioClose = () => {
    stopAudio(); stopTrack();
    window.removeEventListener('resize', redraw);
    inset.remove();
    overlay.remove(); studioClose = null;
  };
  function stopAudio() {
    if (player) { player.pause(); player = null; }
    if (raf) cancelAnimationFrame(raf);
    playingIdx = -1; playingStrip = -1;
  }

  async function load() {
    const g = ++genCount;
    stopAudio();
    if (!status.isConnected) wrap.appendChild(status);
    status.textContent = 'decoding the city…';
    try {
      const p = new URLSearchParams();
      if (currentTf !== 'all') p.append('since', sinceDate(currentTf));
      const recs = await fetch(`${API}/api/recordings?${p}`).then(r => r.json());
      const AC = new (window.AudioContext || window.webkitAudioContext)();
      const out = [];
      for (const rec of recs.slice(0, 24)) {
        const cached = studioCache.get(rec.filename);
        if (cached) { out.push({ rec, ...cached }); continue; }
        try {
          const ab = await fetch(`${API}/uploads/${rec.filename}`).then(r => r.arrayBuffer());
          const buf = await AC.decodeAudioData(ab);
          const an = analyzeBuffer(buf);
          studioCache.set(rec.filename, { buf, ...an });
          out.push({ rec, buf, ...an });
        } catch {}
      }
      await AC.close();
      if (g !== genCount) return;
      clips = out;
      if (clips.length) status.remove();
      else status.textContent = 'no recordings in this window';
      updateSelLabel();
      redraw();
    } catch { status.textContent = 'could not load recordings'; }
  }

  const BAND_EDGES = [0, 1, 2, 4, 7, 12, 25];
  const maxKm = () => Math.max(8, ...clips.map(c => distKm(c.rec.lat, c.rec.lng))) * 1.1;
  function bands() {
    const mk = maxKm(), out = [];
    for (let i = 0; i < BAND_EDGES.length - 1; i++) {
      out.push([BAND_EDGES[i], BAND_EDGES[i + 1]]);
      if (BAND_EDGES[i + 1] >= mk) break;
    }
    return out;
  }
  function inBand(c, b) { const k = distKm(c.rec.lat, c.rec.lng); return k >= b[0] && k < b[1]; }
  function stripClips() { return selBand ? clips.filter(c => inBand(c, selBand)) : clips; }
  function updateSelLabel() {
    const n = stripClips().length;
    selLabel.textContent = selBand
      ? `${n} sound${n === 1 ? '' : 's'} · ${selBand[0]}–${selBand[1]} km from your point`
      : `${n} sound${n === 1 ? '' : 's'} · the whole city`;
    genBtn.disabled = n === 0;
  }

  function drawPolar(highlightIdx = -1, playFrac = null) {
    const W = wrap.clientWidth, H = wrap.clientHeight, dpr = devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);
    if (!clips.length) { nodes = []; geo = null; return; }

    const cx = W / 2, cy = H / 2;
    const Rin = Math.min(W, H) * 0.10, Rout = Math.min(W, H) * 0.40;
    const amp = Math.min(W, H) * 0.05;
    const mk = maxKm();
    const kmToR = km => Rin + Math.sqrt(Math.min(km / mk, 1)) * (Rout - Rin);
    geo = { cx, cy, Rin, Rout, amp, kmToR, mk };

    // hour spokes
    ctx.strokeStyle = '#e6e6e6'; ctx.fillStyle = '#b5b5b5';
    ctx.font = '10px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (let h = 0; h < 24; h += 6) {
      const a = (h / 24) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * (Rin - 12), cy + Math.sin(a) * (Rin - 12));
      ctx.lineTo(cx + Math.cos(a) * (Rout + amp + 6), cy + Math.sin(a) * (Rout + amp + 6));
      ctx.stroke();
      const lbl = h === 0 ? '12a' : h === 12 ? '12p' : (h % 12) + (h < 12 ? 'a' : 'p');
      ctx.fillText(lbl, cx + Math.cos(a) * (Rout + amp + 22), cy + Math.sin(a) * (Rout + amp + 22));
    }

    // selected band wash
    if (selBand) {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.beginPath();
      ctx.arc(cx, cy, kmToR(selBand[1]), 0, Math.PI * 2);
      ctx.arc(cx, cy, kmToR(selBand[0]), 0, Math.PI * 2, true);
      ctx.fill('evenodd');
    }

    // distance ring boundaries + labels
    for (const b of bands()) {
      const r = kmToR(b[1]);
      const active = selBand && selBand[0] === b[0];
      ctx.strokeStyle = active ? '#777' : '#dcdcdc'; ctx.lineWidth = 1;
      ctx.setLineDash([2, 6]);
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
      const la = -Math.PI * 0.72; // upper-left
      ctx.fillStyle = active ? '#555' : '#c0c0c0'; ctx.font = '9px Inter, sans-serif';
      ctx.fillText(`${b[1]} km`, cx + Math.cos(la) * r, cy + Math.sin(la) * r - 7);
    }

    // clips as waveform bursts
    nodes = [];
    for (let i = 0; i < clips.length; i++) {
      const { rec, buf } = clips[i];
      const d = new Date(rec.timestamp);
      const theta = ((d.getHours() + d.getMinutes() / 60) / 24) * Math.PI * 2 - Math.PI / 2;
      const r = kmToR(distKm(rec.lat, rec.lng));
      const dimmed = selBand && !inBand(clips[i], selBand);
      const hi = i === highlightIdx || i === playingIdx;

      const raw = buf.getChannelData(0);
      let peak = 0; for (let k = 0; k < raw.length; k += 50) peak = Math.max(peak, Math.abs(raw[k]));
      const norm = peak ? 0.95 / peak : 1;
      const arcW = Math.PI / 11, pts = 150;
      ctx.strokeStyle = dimmed ? '#d0d0d0' : '#111';
      ctx.lineWidth = hi ? 1.6 : 1.1;
      ctx.beginPath();
      for (let k = 0; k <= pts; k++) {
        const f = k / pts;
        const a = theta - arcW / 2 + f * arcW;
        const v = raw[Math.floor(f * (raw.length - 1))] * norm;
        const rr = r + v * amp * (hi ? 1 : 0.8);
        const x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
        k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();

      const lx = cx + Math.cos(theta) * (r + amp + 12), ly = cy + Math.sin(theta) * (r + amp + 12);
      ctx.fillStyle = hi ? '#111' : dimmed ? '#d0d0d0' : '#9a9a9a';
      ctx.font = `${hi ? '700 ' : ''}9px Inter, sans-serif`;
      ctx.fillText(((rec.tags && rec.tags[0]) || 'sound').toUpperCase(), lx, ly);

      if (i === playingIdx && playFrac !== null) {
        const a = theta - arcW / 2 + playFrac * arcW;
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 3.5, 0, Math.PI * 2); ctx.fill();
      }
      nodes.push({ x: cx + Math.cos(theta) * r, y: cy + Math.sin(theta) * r, i });
    }

    // the heart
    ctx.fillStyle = '#111';
    ctx.font = '700 20px Space Grotesk, Inter, sans-serif';
    ctx.fillText(String(clips.length), cx, cy - 7);
    ctx.fillStyle = '#9a9a9a'; ctx.font = '8.5px Inter, sans-serif';
    ctx.fillText('SOUNDS AROUND', cx, cy + 10);
    ctx.fillText('YOUR POINT', cx, cy + 21);
  }

  function drawStrip(highlightIdx = -1, playX = null) {
    const W = strip.clientWidth, H = strip.clientHeight, dpr = devicePixelRatio || 1;
    strip.width = W * dpr; strip.height = H * dpr;
    const ctx = strip.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);
    const sel = stripClips().slice().sort((a, b) => a.rec.lng - b.rec.lng);
    stripSegs = [];
    if (!sel.length) return;

    const lngs = sel.map(c => c.rec.lng);
    const minLng = Math.min(...lngs), span = (Math.max(...lngs) - minLng) || 1;
    const padL = 46, padR = 46, gap = 16;
    const segW = Math.max(24, Math.min(90, (W - padL - padR - gap * (sel.length - 1)) / sel.length));
    let xs = sel.map(c => padL + ((c.rec.lng - minLng) / span) * (W - padL - padR - segW));
    for (let i = 1; i < xs.length; i++) if (xs[i] < xs[i - 1] + segW + gap) xs[i] = xs[i - 1] + segW + gap;
    if (xs.length) {
      xs[xs.length - 1] = Math.min(xs[xs.length - 1], W - padR - segW);
      for (let i = xs.length - 2; i >= 0; i--) if (xs[i] + segW + gap > xs[i + 1]) xs[i] = xs[i + 1] - gap - segW;
    }

    const base = H * 0.44, amp = H * 0.3;
    ctx.lineWidth = 1.2; ctx.strokeStyle = '#111'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(0, base);
    for (let si = 0; si < sel.length; si++) {
      const c = sel[si], x = xs[si];
      ctx.lineTo(x, base);
      const raw = c.buf.getChannelData(0);
      let peak = 0; for (let k = 0; k < raw.length; k += 50) peak = Math.max(peak, Math.abs(raw[k]));
      const norm = peak ? 0.95 / peak : 1;
      const pts = Math.floor(segW * 2);
      for (let k = 0; k < pts; k++) {
        const v = raw[Math.floor(k * raw.length / pts)] * norm;
        ctx.lineTo(x + (k / pts) * segW, base - v * amp * (si === highlightIdx || si === playingStrip ? 1 : 0.8));
      }
      ctx.lineTo(x + segW, base);
      stripSegs.push({ x, w: segW, c });
    }
    ctx.lineTo(W, base);
    ctx.stroke();

    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    for (let si = 0; si < stripSegs.length; si++) {
      const { x, w, c } = stripSegs[si];
      const hi = si === highlightIdx || si === playingStrip;
      ctx.fillStyle = hi ? '#111' : '#9a9a9a';
      ctx.font = `${hi ? '700 ' : ''}9px Inter, sans-serif`;
      ctx.fillText(((c.rec.tags && c.rec.tags[0]) || 'sound').toUpperCase(), x + w / 2, H - (si % 2 ? 4 : 14));
    }
    ctx.fillStyle = '#c2c2c2'; ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'left'; ctx.fillText('W ◀', 12, 12);
    ctx.textAlign = 'right'; ctx.fillText('▶ E', W - 12, 12);

    if (playX !== null) {
      ctx.strokeStyle = '#111'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(playX, base - amp - 2); ctx.lineTo(playX, base + amp + 2); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function redraw() { drawPolar(); drawStrip(); }

  function polarHit(mx, my) {
    let best = -1, bd = 30 * 30;
    for (const n of nodes) {
      const d = (n.x - mx) ** 2 + (n.y - my) ** 2;
      if (d < bd) { bd = d; best = n.i; }
    }
    if (best >= 0) return { type: 'node', i: best };
    if (geo) {
      const dr = Math.hypot(mx - geo.cx, my - geo.cy);
      if (dr > geo.Rin * 0.4 && dr < geo.Rout + geo.amp) {
        // invert sqrt mapping to km
        const km = ((dr - geo.Rin) / (geo.Rout - geo.Rin)) ** 2 * geo.mk;
        const b = bands().find(b => km >= b[0] && km < b[1]);
        if (b) return { type: 'band', band: b };
      }
    }
    return null;
  }

  function playClip(clipEntry, onFrame, onDone) {
    stopAudio();
    player = new Audio(`${API}/uploads/${clipEntry.rec.filename}`);
    player.play();
    caption.textContent = '“' + promptFor(clipEntry.rec) + '”';
    const step = () => {
      if (!player || player.ended || player.paused) { onDone(); return; }
      onFrame(player.currentTime / (player.duration || 1));
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
  }

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    const hit = polarHit(e.clientX - r.left, e.clientY - r.top);
    canvas.style.cursor = hit ? 'pointer' : 'default';
    if (hit && hit.type === 'node') {
      const c = clips[hit.i];
      tip.textContent = `${(c.rec.tags || []).join(' · ')} — ${distKm(c.rec.lat, c.rec.lng).toFixed(1)} km out, ${new Date(c.rec.timestamp).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}`;
      const n = nodes.find(n => n.i === hit.i);
      tip.style.left = n.x + 'px'; tip.style.top = (n.y - 14) + 'px';
      tip.style.opacity = 1;
      if (playingIdx < 0) drawPolar(hit.i);
    } else if (hit && hit.type === 'band') {
      tip.textContent = `${hit.band[0]}–${hit.band[1]} km from your point — click to select`;
      tip.style.left = (e.clientX - r.left) + 'px'; tip.style.top = (e.clientY - r.top - 8) + 'px';
      tip.style.opacity = 1;
      if (playingIdx < 0) drawPolar();
    } else {
      tip.style.opacity = 0;
      if (playingIdx < 0) drawPolar();
    }
  });
  canvas.addEventListener('mouseleave', () => { tip.style.opacity = 0; if (playingIdx < 0) drawPolar(); });
  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    const hit = polarHit(e.clientX - r.left, e.clientY - r.top);
    if (!hit) return;
    if (hit.type === 'node') {
      playingIdx = hit.i;
      playClip(clips[hit.i], f => drawPolar(hit.i, f), () => { playingIdx = -1; drawPolar(); });
    } else {
      selBand = (selBand && selBand[0] === hit.band[0]) ? null : hit.band;
      updateSelLabel(); redraw();
    }
  });

  strip.addEventListener('mousemove', e => {
    const r = strip.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const idx = stripSegs.findIndex(s => mx >= s.x - 3 && mx <= s.x + s.w + 3);
    strip.style.cursor = idx >= 0 ? 'pointer' : 'default';
    if (playingStrip < 0) drawStrip(idx);
  });
  strip.addEventListener('mouseleave', () => { if (playingStrip < 0) drawStrip(); });
  strip.addEventListener('click', e => {
    const r = strip.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const idx = stripSegs.findIndex(s => mx >= s.x - 3 && mx <= s.x + s.w + 3);
    if (idx < 0) return;
    const seg = stripSegs[idx];
    playingStrip = idx;
    playClip(seg.c, f => drawStrip(idx, seg.x + f * seg.w), () => { playingStrip = -1; drawStrip(); });
  });

  let trackAudio = null;
  function stopTrack() { if (trackAudio) { trackAudio.pause(); trackAudio = null; } }
  async function doGenerate() {
    const sel = stripClips();
    if (!sel.length) return;
    stopAudio(); stopTrack();
    genBtn.disabled = true; result.innerHTML = '';
    try {
      const { url, BPM, genre: gLabel } = await generateTrack(sel, currentTf + (selBand ? selBand.join('-') : 'city'), genre,
        s => { selLabel.textContent = s; });
      trackAudio = new Audio(url);
      const playBtn = el('button', { class: 'btn-tool', style: 'padding:8px 16px;', onclick() {
        if (trackAudio.paused) trackAudio.play(); else trackAudio.pause();
      } }, '❚❚ pause');
      const setLbl = () => { playBtn.innerHTML = trackAudio.paused ? '<span class="tool-glyph">▶</span> play' : '<span class="tool-glyph">❚❚</span> pause'; };
      // seekable progress bar
      const fmt = s => { s = Math.max(0, s | 0); return (s / 60 | 0) + ':' + String(s % 60).padStart(2, '0'); };
      const fill = el('div', { style: 'height:100%;width:0;background:#111;border-radius:3px;' });
      const bar = el('div', {
        style: 'position:relative;width:150px;height:6px;background:#e2e2e2;border-radius:3px;cursor:pointer;',
        onclick(e) { const r = bar.getBoundingClientRect(); trackAudio.currentTime = ((e.clientX - r.left) / r.width) * (trackAudio.duration || 0); }
      }, fill);
      const timeLbl = el('span', { style: 'font-size:10px;color:var(--ink-light);min-width:72px;font-variant-numeric:tabular-nums;' }, '0:00 / 0:00');
      trackAudio.ontimeupdate = () => { const d = trackAudio.duration || 1; fill.style.width = (100 * trackAudio.currentTime / d) + '%'; timeLbl.textContent = `${fmt(trackAudio.currentTime)} / ${fmt(d)}`; };
      trackAudio.onplay = setLbl; trackAudio.onpause = setLbl; trackAudio.onended = () => { setLbl(); fill.style.width = '0'; };
      trackAudio.play();
      result.append(
        playBtn, bar, timeLbl,
        el('a', { class: 'btn-dl', style: 'padding:8px 14px;', href: url, download: `city-${gLabel}.wav` }, '↓ wav'),
        el('span', { style: 'font-size:11px;color:var(--ink-light);' }, `${gLabel} · ${BPM} bpm · ${sel.length} sounds`)
      );
    } catch (e) { console.error(e); selLabel.textContent = 'error: ' + e.message; }
    updateSelLabel();
    genBtn.disabled = false;
  }

  window.addEventListener('resize', redraw);
  load();
}


/* ── Audio utils ── */
function encodeWav(buf){
  const ch=buf.numberOfChannels,sr=buf.sampleRate,len=buf.length;
  const ab=new ArrayBuffer(44+len*ch*2),v=new DataView(ab);
  const s=(o,str)=>{for(let i=0;i<str.length;i++)v.setUint8(o+i,str.charCodeAt(i));};
  s(0,'RIFF');v.setUint32(4,36+len*ch*2,true);s(8,'WAVE');s(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,ch,true);v.setUint32(24,sr,true);v.setUint32(28,sr*ch*2,true);v.setUint16(32,ch*2,true);v.setUint16(34,16,true);
  s(36,'data');v.setUint32(40,len*ch*2,true);
  let off=44;
  for(let i=0;i<len;i++)for(let c=0;c<ch;c++){const x=Math.max(-1,Math.min(1,buf.getChannelData(c)[i]));v.setInt16(off,x<0?x*0x8000:x*0x7fff,true);off+=2;}
  return ab;
}
</script>
